<style>
:root{
  --indigo:#0B0E31;        /* Night Indigo — primary background */
  --card:#141A47;          /* Deep Card Blue — surfaces */
  --line:#232B63;          /* derived hairline on indigo */
  --orange:#FF7A1A;        /* Wanana Orange — the one accent */
  --glow:#FF9A4D;          /* Orange Glow — tint */
  --teal:#2DD4BF;          /* Oracle Teal — YES, verified, skill */
  --coral:#FB7185;         /* Coral Pink — NO, caution */
  --text:#F4F6FF;          /* Cloud White */
  --slate:#8E95BE;         /* Muted Slate — supporting text */
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--indigo)}
body{background:var(--indigo);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.3}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:96px;position:relative}
@media(min-width:560px){.wrap{border-left:1px solid var(--line);border-right:1px solid var(--line)}}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--orange);outline-offset:2px}
input,select,textarea{font-family:inherit;width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:14px}
::placeholder{color:var(--slate);opacity:.75}
img.logo{display:block}

/* header */
header{padding:16px 16px 12px;display:flex;justify-content:space-between;align-items:center}
.balance{font-family:var(--disp);font-weight:600;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13.5px}
.balance .naira{color:var(--glow)}

/* chips & feed */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 16px 14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--line);color:var(--slate)}
.chip.on{border-color:var(--orange);background:var(--orange);color:var(--indigo)}
.feed{padding:0 16px;display:flex;flex-direction:column;gap:12px}

/* market card — per brand anatomy */
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:15px 16px;transition:transform .12s ease}
.card:active{transform:scale(.985)}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.cat{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.09em}
.live{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--teal);letter-spacing:.08em}
.live .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal)}
.q{font-family:var(--disp);font-weight:600;font-size:16.5px;line-height:1.32;margin-bottom:12px}
.bar{position:relative;display:flex;height:7px;border-radius:999px;overflow:visible;margin-bottom:12px}
.bar .y{background:var(--teal);border-radius:999px 0 0 999px}
.bar .n{flex:1;background:var(--coral);border-radius:0 999px 999px 0}
.bar .spark{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:var(--orange);border:2.5px solid var(--indigo);box-shadow:0 0 10px rgba(255,122,26,.8)}
.row{display:flex;gap:10px;margin-bottom:11px}
.btn-yes,.btn-no{flex:1;padding:11px 0;border-radius:8px;font-family:var(--disp);font-weight:600;font-size:14px}
.btn-yes{background:rgba(45,212,191,.13);color:var(--teal)}
.btn-no{background:rgba(251,113,133,.13);color:var(--coral)}
.stats{display:flex;justify-content:space-between;font-size:12px;color:var(--slate)}
.stats b{color:var(--text);font-weight:600}
.coin{color:var(--glow)}

/* section titles */
.tabtitle{font-family:var(--disp);font-weight:700;font-size:23px;margin:2px 0 5px}
.sub{color:var(--slate);font-size:13px;margin:0 0 16px;line-height:1.5}
.pad{padding:4px 16px}
label{font-size:11.5px;font-weight:600;color:var(--slate);display:block;margin-bottom:6px;letter-spacing:.02em}
.field{margin-bottom:15px}
.cta{width:100%;padding:15px 0;border-radius:8px;background:var(--orange);color:var(--indigo);font-family:var(--disp);font-weight:700;font-size:15px}
.note{color:var(--slate);font-size:11.5px;margin-top:14px;line-height:1.65}

/* bottom nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--indigo);border-top:1px solid var(--line);display:flex;z-index:40}
nav button{flex:1;padding:13px 0 calc(15px + env(safe-area-inset-bottom));color:var(--slate);font-weight:600;font-size:11.5px;position:relative}
nav button.on{color:var(--orange)}
nav button.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:3px;background:var(--orange);border-radius:0 0 4px 4px}

/* sheets */
.sheet-bg{position:fixed;inset:0;background:rgba(4,6,24,.72);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.sheet{width:100%;max-width:480px;max-height:88vh;overflow-y:auto;background:var(--indigo);border:1px solid var(--line);border-bottom:none;border-radius:14px 14px 0 0;padding:20px 18px calc(28px + env(safe-area-inset-bottom))}
.handle{width:40px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 16px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--orange);color:var(--indigo);font-weight:700;font-size:13px;padding:11px 18px;border-radius:999px;z-index:70;max-width:92vw;text-align:center}

/* insights */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:13px 14px}
.stat .l{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.stat .v{font-family:var(--disp);font-weight:700;font-size:19px;margin-top:4px}
.aicard{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--orange);border-radius:8px;padding:15px 16px;margin-bottom:14px}
.aicard .t{font-family:var(--disp);font-weight:600;color:var(--glow);font-size:13px;margin-bottom:8px}
.aicard p{font-size:13.5px;line-height:1.65;color:var(--text)}

/* splash */
.hero{display:flex;flex-direction:column;justify-content:center;min-height:100vh;min-height:100dvh;padding:30px 26px;position:relative;overflow:hidden}
.skill-line{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--slate);margin-bottom:22px}
.hero h1{font-family:var(--disp);font-weight:700;font-size:31px;line-height:1.18;margin:14px 0 12px}
.hero h1 .em{color:var(--orange)}
.hero p{color:var(--slate);font-size:14.5px;line-height:1.65;margin:0 0 26px}
.net{position:absolute;inset:0;pointer-events:none;opacity:.5}
.comment{margin-bottom:11px;font-size:13.5px;line-height:1.5}
.comment b{color:var(--glow);font-weight:600}
.verified{display:inline-flex;align-items:center;gap:4px;color:var(--teal);font-weight:600}
@media (prefers-reduced-motion:reduce){.card{transition:none}.spark{box-shadow:none !important}}
</style>

async function rpc(fn, args){
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, { method:"POST", headers:H, body:JSON.stringify(args) });
  return r.json();
}
async function loadMarkets(){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/markets?select=*&status=eq.open&order=created_at.desc`, { headers:H });
    S.markets = await r.json();
  }catch(e){ toast("Network is slow. Pull to retry."); }
}
async function loadComments(id){
  const r = await fetch(`${SB_URL}/rest/v1/comments?select=*&market_id=eq.${id}&order=created_at.asc`, { headers:H });
  S.comments = await r.json();
}
async function refreshMe(){
  if(!S.token) return;
  const me = await rpc("get_me", { p_token: S.token });
  if(me.error){ localStorage.clear(); S.token = null; S.username = null; }
  else { S.balance = me.balance; S.username = me.username; }
}
async function refreshCalls(){
  if(!S.token) return;
  const r = await rpc("get_my_calls", { p_token: S.token });
  S.myCalls = Array.isArray(r) ? r : [];
}

let toastTimer;
function toast(msg){
  document.querySelectorAll(".toast").forEach(e=>e.remove());
  const d = document.createElement("div");
  d.className = "toast"; d.textContent = msg;
  document.body.appendChild(d);
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>d.remove(), 3000);
}

function sparkNet(){
  /* the brand's "spark" device: one bright node in a calm network */
  return `<svg class="net" viewBox="0 0 480 860" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g stroke="#232B63" stroke-width="1">
      <line x1="60" y1="120" x2="200" y2="70"/><line x1="200" y1="70" x2="360" y2="150"/>
      <line x1="360" y1="150" x2="430" y2="60"/><line x1="360" y1="150" x2="300" y2="300"/>
      <line x1="60" y1="120" x2="120" y2="290"/><line x1="120" y1="290" x2="300" y2="300"/>
      <line x1="80" y1="700" x2="220" y2="780"/><line x1="220" y1="780" x2="400" y2="720"/>
      <line x1="400" y1="720" x2="420" y2="560"/>
    </g>
    <g fill="#232B63">
      <circle cx="60" cy="120" r="4"/><circle cx="200" cy="70" r="4"/><circle cx="430" cy="60" r="4"/>
      <circle cx="120" cy="290" r="4"/><circle cx="300" cy="300" r="4"/>
      <circle cx="80" cy="700" r="4"/><circle cx="220" cy="780" r="4"/><circle cx="400" cy="720" r="4"/><circle cx="420" cy="560" r="4"/>
    </g>
    <circle cx="360" cy="150" r="6" fill="#FF7A1A"/>

  </svg>`;
}

function render(){
  const app = document.getElementById("app");
  if(!S.token){ app.innerHTML = heroView(); return; }
  app.innerHTML = `
  <div class="wrap">
    <header>
      <span style="height:24px;display:flex;align-items:center">${WORDMARK.replace('class="logo"','class="logo" style="height:22px;width:auto"')}</span>
      <div class="balance"><span class="naira">\u20A6</span>${Number(S.balance).toLocaleString("en-NG")}</div>
    </header>
    <main id="main">${views[S.tab]()}</main>
    ${S.detail ? detailSheet() : ""}
    ${S.trade ? tradeSheet() : ""}
    <nav aria-label="Main">
      ${[["home","Markets"],["insights","Insights"],["create","Create"],["calls","Your calls"],["wallet","Wallet"]]
        .map(([k,l])=>`<button class="${S.tab===k?"on":""}" onclick="go('${k}')">${l}</button>`).join("")}
    </nav>
  </div>`;
}

function heroView(){
  return `<div class="wrap"><div class="hero">
    ${sparkNet()}
    <div style="position:relative">
      <div class="skill-line">A game of skill</div>
      <span style="display:block;max-width:250px">${WORDMARK.replace('class="logo"','class="logo" style="width:100%;height:auto"')}</span>
      <h1>Africa argues about everything.<br /><span class="em">Wanana pays whoever is right.</span></h1>
      <p>Post a question, make your call, and get paid when you read it right. The crowd sets the price. Skill gets paid. Every result is verified.</p>
      <div class="field"><label>Pick a username to start</label>
        <input id="uname" maxlength="20" placeholder="e.g. LagosOracle" /></div>
      <button class="cta" onclick="signUp()">Make your first call</button>
      <p class="note" style="text-align:center">Open beta on free starter credits. 18+ only. Play within your limit. No forex, stocks or crypto markets, ever.</p>
    </div>
  </div></div>`;
}

const views = {
  home(){
    const list = S.markets.filter(m =>
      (S.cat==="All"||m.category===S.cat) &&
      (!S.query||m.question.toLowerCase().includes(S.query.toLowerCase())));
    return `
    <div style="padding:0 16px 12px"><input placeholder="Search markets" value="${esc(S.query)}" oninput="S.query=this.value;renderMain()" aria-label="Search markets" /></div>
    <div class="chips">${CATS.map(c=>`<button class="chip ${c===S.cat?"on":""}" onclick="S.cat='${c}';renderMain()">${c}</button>`).join("")}</div>
    <div class="feed">
      ${list.map(m=>{
        const y = yesPct(m);
        return `<div class="card" onclick="openDetail(${m.id})">
          <div class="meta"><span class="cat">${m.category}</span><span class="live"><span class="dot"></span>LIVE</span></div>
          <div class="q">${esc(m.question)}</div>
          <div class="bar"><div class="y" style="width:${y}%"></div><div class="n"></div><div class="spark" style="left:${y}%"></div></div>
          <div class="row">
            <button class="btn-yes" onclick="event.stopPropagation();openTrade(${m.id},'YES')">YES ${y}%</button>
            <button class="btn-no" onclick="event.stopPropagation();openTrade(${m.id},'NO')">NO ${100-y}%</button>
          </div>
          <div class="stats"><span><span class="coin">\u20A6</span> <b>${Number(m.yes_pool+m.no_pool).toLocaleString("en-NG")}</b> in the pool</span><span>ends ${esc(m.ends_on)}</span></div>
        </div>`;
      }).join("") || `<div class="card" style="border-style:dashed;text-align:center;color:var(--slate);font-size:14px;padding:28px 16px">No open markets yet. Ask something Africa will argue about.</div>`}
    </div>`;
  },
  insights(){
    const open = S.myCalls.filter(c=>c.status==="open");
    const atStake = open.reduce((s,c)=>s+c.amount,0);
    const potential = open.reduce((s,c)=>{
      const y = yesPct(c); const price = c.side==="YES" ? y : 100-y;
      return s + Math.round(c.amount*100/Math.max(price,1));
    },0);
    const byCat = {}; open.forEach(c=>byCat[c.category]=(byCat[c.category]||0)+1);
    const best = Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
    return `<div class="pad">
      <h2 class="tabtitle">Your insights</h2>
      <p class="sub">Wanana studies every call you make and shows you where your edge is.</p>
      <div class="grid2">
        <div class="stat"><div class="l">Open calls</div><div class="v">${open.length}</div></div>
        <div class="stat"><div class="l">At stake</div><div class="v">${N(atStake)}</div></div>
        <div class="stat"><div class="l">Potential win</div><div class="v" style="color:var(--teal)">${N(potential)}</div></div>
        <div class="stat"><div class="l">Best category</div><div class="v">${best?best[0]:"None yet"}</div></div>
      </div>
      <div class="aicard"><div class="t">Wanana AI weekly brief</div>
        <p>${open.length===0
          ? "Once you make your first few calls, the AI starts learning your pattern. It will tell you which categories you read best, when you tend to overpay for YES, and which markets are moving before the crowd notices. Make a call and check back."
          : `Early days, but here is what the numbers say. Most of your activity sits in ${best?best[0]:"one category"}, and your open positions would return ${N(potential)} if they all land. Watch how pools move in the final week before resolution. Late money usually knows something.`}</p>
      </div>
      <p class="note">Oracle ranks unlock at ten settled calls. Read the moment better than the crowd and climb.</p>
    </div>`;
  },
  create(){
    return `<div class="pad">
      <h2 class="tabtitle">Create a market</h2>
      <p class="sub">Post any real world yes or no scenario. Creators earn 1% of the settled pool.</p>
      <div class="field"><label>Your question</label><input id="cq" maxlength="200" placeholder="Will Davido headline the O2 Arena in 2026?" /></div>
      <div class="field"><label>Category</label><select id="cc">${CATS.filter(c=>c!=="All").map(c=>`<option>${c}</option>`).join("")}</select></div>
      <div class="field"><label>Resolution date</label><input id="ce" placeholder="Dec 31, 2026" /></div>
      <div class="field"><label>Resolution source</label><input id="cs" placeholder="CAF website, INEC results, Grammy.com" /></div>
      <button class="cta" onclick="submitMarket()">Launch market</button>
      <p class="note">House rules: no forex, stocks, crypto or securities. Nothing involving harm to any person. Every market settles against a pre listed public source, with a 48 hour dispute window before payout. Markets that break the rules get taken down and voided.</p>
    </div>`;
  },
  calls(){
    return `<div class="pad">
      <h2 class="tabtitle">Your calls</h2>
      <p class="sub">Every open position and how it settles.</p>
      ${S.myCalls.length===0 ? `<div class="card" style="border-style:dashed;text-align:center;color:var(--slate);font-size:14px;padding:26px 16px">No calls yet. Head to the markets feed and back your first read.</div>` : ""}
      ${S.myCalls.map(c=>{
        const y = yesPct(c); const price = c.side==="YES"?y:100-y;
        const payout = Math.round(c.amount*100/Math.max(price,1));
        const won = c.status==="resolved" && c.outcome===c.side;
        return `<div class="card" style="margin-bottom:12px">
          <div style="font-family:var(--disp);font-weight:600;font-size:14.5px;line-height:1.4;margin-bottom:10px">${esc(c.question)}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;flex-wrap:wrap;gap:6px">
            <span style="color:${c.side==="YES"?"var(--teal)":"var(--coral)"};font-weight:700">${c.side} @ ${price}%</span>
            <span style="color:var(--slate)">Staked ${N(c.amount)}</span>
            <span style="color:${won||c.status!=="resolved"?"var(--glow)":"var(--slate)"};font-weight:700">${c.status==="resolved" ? (won?"Nice read":"Not this time") : "Wins "+N(payout)}</span>
          </div></div>`;
      }).join("")}
    </div>`;
  },
  wallet(){
    return `<div class="pad">
      <h2 class="tabtitle">Wallet</h2>
      <div style="background:var(--card);border:1px solid var(--line);border-top:3px solid var(--orange);border-radius:8px;padding:20px;margin-bottom:14px">
        <div style="font-size:10.5px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.08em">Available balance</div>
        <div style="font-family:var(--disp);font-weight:700;font-size:34px;margin-top:4px"><span style="color:var(--glow)">\u20A6</span>${Number(S.balance).toLocaleString("en-NG")}</div>
        <div style="font-size:12px;color:var(--slate);margin-top:6px">Signed in as <b style="color:var(--text)">${esc(S.username)}</b></div>
      </div>
      <div class="row">
        <button class="btn-yes" style="background:var(--card);color:var(--text);border:1px solid var(--line)" onclick="topUp()">Get free credits</button>
        <button class="btn-no" style="background:var(--card);color:var(--text);border:1px solid var(--line)" onclick="toast('Cash wallets arrive with our gaming licence')">Withdraw</button>
      </div>
      <p class="note">Wanana is in open beta and runs on free play credits while our licence application is in progress. Cash funding via Paystack and Flutterwave, plus USSD, with KYC by BVN or NIN, switches on at launch.</p>
      <p class="note">Play within your limit. Take a break anytime. 18+ only.</p>
    </div>`;
  },
};

function detailSheet(){
  const m = S.detail; const y = yesPct(m);
  return `<div class="sheet-bg" onclick="S.detail=null;render()">
    <div class="sheet" onclick="event.stopPropagation()" role="dialog" aria-label="Market detail">
      <div class="handle"></div>
      <div class="meta"><span class="cat">${m.category}</span><span class="live"><span class="dot"></span>LIVE</span></div>
      <div class="q" style="font-size:19.5px">${esc(m.question)}</div>
      <div class="bar" style="height:9px"><div class="y" style="width:${y}%"></div><div class="n"></div><div class="spark" style="left:${y}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-family:var(--disp);font-size:13.5px;font-weight:600;margin-bottom:16px">
        <span style="color:var(--teal)">YES ${y}%</span><span style="color:var(--coral)">NO ${100-y}%</span></div>
      <div class="row">
        <button class="btn-yes" style="background:var(--teal);color:var(--indigo)" onclick="openTrade(${m.id},'YES')">Call YES</button>
        <button class="btn-no" style="background:var(--coral);color:var(--indigo)" onclick="openTrade(${m.id},'NO')">Call NO</button>
      </div>
      <div style="background:var(--card);border:1px solid var(--line);border-radius:8px;padding:13px 14px;font-size:12.5px;color:var(--slate);line-height:1.65;margin-bottom:16px">
        <span class="verified">\u2713 Verified settlement</span> · outcome confirmed via ${esc(m.source)}. Pool ${N(m.yes_pool+m.no_pool)} · created by ${esc(m.creator)}. Winners split the pool by stake. Wanana takes 5%, the creator earns 1%, and payouts release after a 48 hour dispute window.
      </div>
      <div style="font-family:var(--disp);font-weight:600;font-size:14px;margin-bottom:10px">Discussion</div>
      <div id="comments">${S.comments.map(c=>`<div class="comment"><b>${esc(c.username)}</b> ${esc(c.body)}</div>`).join("") || `<div style="color:var(--slate);font-size:13px;margin-bottom:10px">No takes yet. Drop the first one.</div>`}</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="cbody" maxlength="500" placeholder="Share your take" style="flex:1" />
        <button onclick="postComment()" style="padding:0 18px;background:var(--orange);color:var(--indigo);font-family:var(--disp);font-weight:700;font-size:13px;border-radius:8px">Post</button>
      </div>
    </div></div>`;
}

function tradeSheet(){
  const {m, side} = S.trade; const y = yesPct(m); const price = side==="YES"?y:100-y;
  return `<div class="sheet-bg" style="z-index:55" onclick="S.trade=null;render()">
    <div class="sheet" onclick="event.stopPropagation()" role="dialog" aria-label="Make your call">
      <div class="handle"></div>
      <div style="font-family:var(--disp);font-weight:600;font-size:15.5px;line-height:1.4;margin-bottom:6px">${esc(m.question)}</div>
      <div style="font-size:13px;color:${side==="YES"?"var(--teal)":"var(--coral)"};font-weight:700;margin-bottom:16px">Calling ${side} at ${price}%</div>
      <input id="stake" inputmode="numeric" placeholder="Stake amount, minimum \u20A6500" oninput="this.value=this.value.replace(/\\D/g,'');updatePayout(${price})" style="font-size:16px;margin-bottom:10px" aria-label="Stake amount" />
      <div class="row">${[1000,5000,20000].map(v=>`<button class="chip" style="flex:1;text-align:center" onclick="document.getElementById('stake').value='${v}';updatePayout(${price})">${N(v)}</button>`).join("")}</div>
      <div id="payout" style="font-size:13px;color:var(--slate);margin-bottom:14px;min-height:18px"></div>
      <button class="cta" style="background:${side==="YES"?"var(--teal)":"var(--coral)"}" onclick="confirmStake()">Make your call</button>
      <p class="note" style="text-align:center">Only stake what you choose. Play within your limit.</p>
    </div></div>`;
}

window.go = async (t)=>{ S.tab=t; S.detail=null; S.trade=null;
  if(t==="home") await loadMarkets();
  if(t==="calls"||t==="insights") await refreshCalls();
  if(t==="wallet") await refreshMe();
  render(); };
window.renderMain = ()=>{ document.getElementById("main").innerHTML = views[S.tab]();
  const q=document.querySelector('#main input'); if(q&&S.tab==="home"&&S.query){q.focus();q.setSelectionRange(q.value.length,q.value.length);} };
window.openDetail = async (id)=>{ S.detail = S.markets.find(m=>m.id===id); await loadComments(id); render(); };
window.openTrade = (id, side)=>{ S.trade = { m:S.markets.find(x=>x.id===id)||S.detail, side }; render(); };
window.updatePayout = (price)=>{ const v=parseInt(document.getElementById("stake").value,10);
  document.getElementById("payout").innerHTML = v>=500 ? `If your read lands you collect <b style="color:var(--glow)">${N(Math.round(v*100/Math.max(price,1)))}</b>` : ""; };
window.signUp = async ()=>{
  const u = document.getElementById("uname").value.trim();
  if(u.length<3) return toast("Username needs at least 3 characters");
  const r = await rpc("register_user",{ p_username:u });
  if(r.error) return toast(r.error);
  localStorage.setItem("wn_token", r.token); localStorage.setItem("wn_user", r.username);
  S.token=r.token; S.username=r.username; S.balance=r.balance;
  await loadMarkets(); render();
  toast(`Welcome ${r.username}. You have ${N(r.balance)} starter credits`);
};
window.confirmStake = async ()=>{
  const v = parseInt(document.getElementById("stake").value,10);
  if(!v||v<500) return toast("Minimum stake is \u20A6500");
  const r = await rpc("place_call",{ p_token:S.token, p_market_id:S.trade.m.id, p_side:S.trade.side, p_amount:v });
  if(r.error) return toast(r.error);
  S.balance = r.balance; const side=S.trade.side; S.trade=null; S.detail=null;
  await loadMarkets(); render();
  toast(`Your ${side} call is in for ${N(v)}`);
};
window.submitMarket = async ()=>{
  const q=document.getElementById("cq").value, c=document.getElementById("cc").value,
        e=document.getElementById("ce").value, s=document.getElementById("cs").value;
  if(q.trim().length<15) return toast("Write a clear yes or no question first");
  if(!e.trim()) return toast("Set a resolution date");
  if(!s.trim()) return toast("Name a public source that settles it");
  const r = await rpc("create_market",{ p_token:S.token, p_question:q, p_category:c, p_ends_on:e, p_source:s });
  if(r.error) return toast(r.error);
  await loadMarkets(); S.tab="home"; render();
  toast("Your market is live. Share it to grow the pool");
};
window.postComment = async ()=>{
  const b = document.getElementById("cbody").value;
  if(!b.trim()) return;
  const r = await rpc("add_comment",{ p_token:S.token, p_market_id:S.detail.id, p_body:b });
  if(r.error) return toast(r.error);
  await loadComments(S.detail.id); render();
};
window.topUp = async ()=>{
  const r = await rpc("demo_top_up",{ p_token:S.token });
  if(r.error) return toast(r.error);
  S.balance = r.balance; render(); toast("\u20A650,000 free credits added");
};

(async ()=>{
  await Promise.all([loadMarkets(), refreshMe()]);
  render();
})();
</script>
</body>
</html>
