<script>
/* Load the Supabase library from our own domain first (immune to CDN
   blockers), with CDN backups, and a helpful message if everything fails. */
(function(){
  function boot(){ if(window.supabase && window.__wananaBoot) window.__wananaBoot(); }
  function fail(){
    var el = document.getElementById("app");
    if(el) el.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;text-align:center;color:#8E95BE;font-family:system-ui;line-height:1.7">Wanana could not load a required component.<br/>A browser extension or privacy shield may be blocking it.<br/>Allow this site in your blocker, or try another browser.</div>';
  }
  function load(src, onerr){
    var s = document.createElement("script");
    s.src = src; s.onload = boot; s.onerror = onerr;
    document.head.appendChild(s);
  }
  window.addEventListener("DOMContentLoaded", function(){
    load("/vendor/supabase.js", function(){
      load("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js", function(){
        load("https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js", fail);
      });
    });
  });
})();
</script>
<style>
:root{
  --indigo:#0B0E31;
  --card:#141A47;
  --line:#232B63;
  --orange:#FF7A1A;
  --glow:#FF9A4D;
  --teal:#2DD4BF;

  --text:#F4F6FF;

}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--indigo)}
body{width:100%;background:var(--indigo);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.3}

button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}

button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--orange);outline-offset:2px}

.avatar{border-radius:50%;background:var(--card);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;color:var(--glow);overflow:hidden;flex-shrink:0}

/* ---------- App shell ---------- */
.shell{display:flex;flex-direction:column;padding-bottom:84px}
header.bar{position:sticky;top:0;z-index:30;background:rgba(11,14,49,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-in{width:100%;max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.topnav{display:none;gap:4px;flex:1;justify-content:center}
.topnav button{padding:9px 16px;border-radius:999px;font-weight:600;font-size:13.5px;color:var(--slate)}
.topnav button.on{color:var(--indigo);background:var(--orange)}
.balance{font-family:var(--disp);font-weight:600;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13.5px;white-space:nowrap}
.balance .naira{color:var(--glow)}
main{width:100%;max-width:1200px;margin:0 auto;padding-top:14px}

/* ---------- Feed ---------- */
.toolbar{padding:0 16px 12px}

<body>
<div id="app"></div>

<script>
window.__wananaBoot = function(){
/* Public configuration. These are Supabase *publishable* values, safe to ship
   to browsers by design. Secret keys (service role, SMTP, payment keys) live
   only in server-side environment variables and never in this repo. */
const SB_URL = "https://ogplsilyrgvlyypxnhyp.supabase.co";
const SB_KEY = "sb_publishable_gH-vwvE5IVXkOpafeP5-OA_TzL5_krH";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

/* Legacy demo session cleanup */
localStorage.removeItem("wn_token"); localStorage.removeItem("wn_user");

const S = {
  session: null,          // Supabase auth session
  profile: null,          // { username, balance } once profile exists
  authMode: "signin",     // signin | signup | otp | otp_verify | reset | newpass
  authEmail: "",
  authMsg: null,          // { text, err }
  busy: false,
  markets: [], myCalls: [],
  tab: "home", cat: "All", query: "",
  detail: null, trade: null, comments: [],
  ledger: [], dispute: null, board: [], pay: null, refPrefill: "", recovery: false, overview: null,
  admin: { markets: [], disputes: [], ledger: [], users: [], comments: [], audit: [], panel: "markets", fS: "all", fC: "all", q: "", fA: "all" },
};
const CATS = ["All","Politics","Sports","Entertainment","Tech","Culture"];
const N = n => "\u20A6" + Number(n||0).toLocaleString("en-NG");
const esc = s => String(s).replace(/[&<>\"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const yesPct = m => { const t = m.yes_pool + m.no_pool; return t === 0 ? 50 : Math.round(m.yes_pool*100/t); };
const WORDMARK = `<img class="logo" src="/brand/wordmark.png" alt="wanana" />`;
function avatarHtml(url, name, size){
  const s = `width:${size}px;height:${size}px;font-size:${Math.round(size*0.42)}px`;
  return url ? `<span class="avatar" style="${s}"><img src="${esc(url)}" alt="" /></span>`
             : `<span class="avatar" style="${s}">${esc((name||"?").charAt(0).toUpperCase())}</span>`;
}

async function rpc(fn, args){
  const { data, error } = await sb.rpc(fn, args || {});
  if(error) return { error: error.message || "Something went wrong. Try again." };
  return data;
}
async function loadMarkets(){
  const { data, error } = await sb.from("markets").select("*").eq("status","live").order("created_at",{ascending:false});
  if(!error && Array.isArray(data)) S.markets = data;
}
async function loadComments(id){
  const { data } = await sb.from("comments").select("*").eq("market_id", id).order("created_at",{ascending:true});
  S.comments = Array.isArray(data) ? data : [];
}
async function loadProfile(){
  if(!S.session){ S.profile = null; return; }
  const me = await rpc("me");
  S.profile = (me && me.username) ? { username: me.username, balance: me.balance, isAdmin: !!me.is_admin, referralCode: me.referral_code, kycStatus: me.kyc_status || "not_started", avatarUrl: me.avatar_url || null } : null;
}
async function loadLedger(){
  if(!S.session) return;
  const r = await rpc("ledger_recent");
  S.ledger = Array.isArray(r) ? r : [];
}
async function loadAdmin(){
  if(!S.profile || !S.profile.isAdmin) return;
  const [m, d, l, u, c, a] = await Promise.all([
    rpc("admin_markets"), rpc("admin_disputes"), rpc("admin_ledger_recent"),
    rpc("admin_users_recent"), rpc("admin_comments_recent"), rpc("admin_audit_recent")]);
  S.admin.markets  = Array.isArray(m) ? m : [];
  S.admin.disputes = Array.isArray(d) ? d : [];
  S.admin.ledger   = Array.isArray(l) ? l : [];
  S.admin.users    = Array.isArray(u) ? u : [];
  S.admin.comments = Array.isArray(c) ? c : [];
  S.admin.audit    = Array.isArray(a) ? a : [];
}
async function loadBoard(){
  const r = await rpc("leaderboard");
  S.board = Array.isArray(r) ? r : [];
}
async function refreshCalls(){
  if(!S.session) return;
  const r = await rpc("my_calls");
  S.myCalls = Array.isArray(r) ? r : [];
}

/* Wanana AI insight engine: rule-based today, API-pluggable later. */
const wananaAI = {
  pulse(m){
    const y = yesPct(m); const pot = m.yes_pool + m.no_pool;
    const pots = S.markets.map(x=>x.yes_pool+x.no_pool).sort((a,b)=>a-b);
    const mid = pots.length ? pots[Math.floor(pots.length/2)] : 0;
    const parts = [];
    if(y >= 62) parts.push(`The crowd is leaning YES at ${y}%.`);
    else if(y <= 38) parts.push(`The crowd is leaning NO at ${100-y}%.`);
    else parts.push("The crowd is split down the middle. Somebody is wrong.");
    if(pot === 0) parts.push("Empty pool. The first call names the price.");
    else if(pot >= mid * 1.5 && pots.length > 2) parts.push(`Serious pool at ${N(pot)}. Conviction is high here.`);
    else if(pot < mid && pots.length > 2) parts.push("Quiet pool so far. Early readers get the best prices.");
    else parts.push(`Pool sits at ${N(pot)}.`);
    if(S.comments.length >= 5) parts.push("The discussion is heating up. Read the takes before you call.");
    parts.push(`Settles against ${esc(m.source)}.`);
    return parts.join(" ");
  },
  edge(calls){
    const settled = calls.filter(c=>c.status==="settled" && c.outcome);
    if(settled.length === 0)
      return "Make your calls and let a few markets settle. Wanana AI starts mapping where your reads are sharpest, category by category.";
    const byCat = {};
    settled.forEach(c=>{ const b = byCat[c.category] = byCat[c.category] || {n:0,w:0}; b.n++; if(c.side===c.outcome) b.w++; });
    const ranked = Object.entries(byCat).map(([cat,b])=>({cat, n:b.n, rate:Math.round(b.w*100/b.n)})).sort((a,b)=>b.rate-a.rate);
    const best = ranked[0]; const wins = settled.filter(c=>c.side===c.outcome).length;
    const overall = Math.round(wins*100/settled.length);
    let line = `Across ${settled.length} settled calls your read rate is ${overall}%.`;
    if(best && best.n >= 2) line += ` Your sharpest category is ${best.cat} at ${best.rate}%. Lean into what you actually know.`;
    else line += " A few more settled calls and the category picture gets clear.";
    if(ranked.length > 1 && ranked[ranked.length-1].rate < 40) line += ` ${ranked[ranked.length-1].cat} has not been kind to you. The crowd sees something there that you do not, yet.`;
    return line;
  },
};

let toastTimer;
function toast(msg){
  document.querySelectorAll(".toast").forEach(e=>e.remove());
  const d = document.createElement("div");
  d.className = "toast"; d.textContent = msg;
  document.body.appendChild(d);
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>d.remove(), 3400);
}
function setMsg(text, err){ S.authMsg = text ? { text, err: !!err } : null; }

function sparkNet(){
  return `<svg class="net" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g stroke="#232B63" stroke-width="1">
      <line x1="120" y1="140" x2="380" y2="80"/><line x1="380" y1="80" x2="640" y2="180"/>
      <line x1="640" y1="180" x2="820" y2="70"/><line x1="640" y1="180" x2="560" y2="360"/>
      <line x1="120" y1="140" x2="220" y2="330"/><line x1="220" y1="330" x2="560" y2="360"/>
      <line x1="160" y1="740" x2="420" y2="820"/><line x1="420" y1="820" x2="760" y2="760"/>
      <line x1="760" y1="760" x2="800" y2="580"/><line x1="1080" y1="120" x2="1300" y2="220"/>
      <line x1="1300" y1="220" x2="1240" y2="440"/><line x1="1240" y1="440" x2="1380" y2="620"/>
      <line x1="1080" y1="120" x2="960" y2="300"/><line x1="960" y1="300" x2="1240" y2="440"/>
    </g>
    <g fill="#232B63">
      <circle cx="120" cy="140" r="4"/><circle cx="380" cy="80" r="4"/><circle cx="820" cy="70" r="4"/>
      <circle cx="220" cy="330" r="4"/><circle cx="560" cy="360" r="4"/>
      <circle cx="160" cy="740" r="4"/><circle cx="420" cy="820" r="4"/><circle cx="760" cy="760" r="4"/><circle cx="800" cy="580" r="4"/>
      <circle cx="1080" cy="120" r="4"/><circle cx="1300" cy="220" r="4"/><circle cx="1240" cy="440" r="4"/><circle cx="1380" cy="620" r="4"/><circle cx="960" cy="300" r="4"/>
    </g>
    <circle cx="640" cy="180" r="6" fill="#FF7A1A"/>
    <circle cx="640" cy="180" r="12" fill="none" stroke="#FF7A1A" stroke-opacity=".35" stroke-width="2"/>
  </svg>`;
}

function marketCard(m, interactive=true){
  const y = yesPct(m);
  return `<div class="card" ${interactive?`onclick="openDetail(${m.id})" role="button" tabindex="0"`:""}>
    <div class="meta"><span class="cat">${m.category}</span><span class="live"><span class="dot"></span>LIVE</span></div>
    <div class="q">${esc(m.question)}</div>
    <div class="bar"><div class="y" style="width:${y}%"></div><div class="n"></div><div class="spark" style="left:${y}%"></div></div>
    ${interactive?`<div class="row">
      <button class="btn-yes" onclick="event.stopPropagation();openTrade(${m.id},'YES')">YES ${y}%</button>

  if(S.authMode === "otp") return `
    <div class="authbox">
      ${authMsgHtml()}
      <div class="field"><label>Email</label><input id="a_email" type="email" autocomplete="email" value="${email}" placeholder="you@example.com" /></div>

        <button class="alink" onclick="authGo('signin')">Sign in with password</button>

      ${S.authMsg && S.authMsg.err ? authMsgHtml() : ""}
      <div class="field"><label>Enter your 6-digit code</label>
        <input id="a_code" class="otp" inputmode="numeric" maxlength="6" placeholder="000000" /></div>
      <button class="cta" ${busy} onclick="doVerifyOtp()">Verify your Wanana account</button>
      <div class="alinks">
        <button class="alink" onclick="doSendOtp(true)">Send a new code</button>
        <button class="alink" onclick="authGo('signin')">Back to sign in</button>
      </div>
    </div>`;
  if(S.authMode === "reset") return `
    <div class="authbox">
      ${authMsgHtml()}
      <div class="field"><label>Email</label><input id="a_email" type="email" autocomplete="email" value="${email}" placeholder="you@example.com" /></div>

      <div class="alinks"><button class="alink" onclick="authGo('signin')">Back to sign in</button></div>

  if(S.authMode === "newpass") return `
    <div class="authbox">
      ${authMsgHtml() || `<p class="authmsg">Set a new password for your Wanana account.</p>`}
      <div class="field"><label>New password</label><input id="a_pass" type="password" autocomplete="new-password" placeholder="At least 8 characters" /></div>

/* ---------------- Auth actions ---------------- */
function grabEmail(){
  const el = document.getElementById("a_email");
  if(el) S.authEmail = el.value.trim();
  return S.authEmail;
}
window.authGo = (mode)=>{ grabEmail(); S.authMode = mode; setMsg(null); render(); };

window.doSignUp = async ()=>{
  const email = grabEmail();
  const pass = (document.getElementById("a_pass")||{}).value || "";
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  if(pass.length < 8) { setMsg("Password needs at least 8 characters", true); return render(); }
  S.busy = true; render();
  const { data, error } = await sb.auth.signUp({ email, password: pass,
    options: { emailRedirectTo: location.origin } });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  if(data.session){ return; } /* auto-confirmed: onAuthStateChange takes over */
  S.authMode = "signin";
  setMsg("Verify your Wanana account. We sent a confirmation link to " + email + ". Open it, then sign in here.");
  render();
};
window.doSignIn = async ()=>{
  const email = grabEmail();
  const pass = (document.getElementById("a_pass")||{}).value || "";
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  S.busy = false;
  if(error){
    const m = /confirm/i.test(error.message)
      ? "Verify your Wanana account first. Check your inbox for the confirmation link."
      : error.message;
    setMsg(m, true); return render();
  }
  setMsg(null); /* onAuthStateChange renders the app */
};
window.doSendOtp = async (resend)=>{
  const email = resend ? S.authEmail : grabEmail();
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.signInWithOtp({ email, options: { shouldCreateUser: true } });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  S.authMode = "otp_verify"; setMsg(null); render();
  if(resend) toast("A new code is on its way");
};
window.doVerifyOtp = async ()=>{
  const code = ((document.getElementById("a_code")||{}).value || "").trim();
  if(code.length !== 6){ setMsg("Enter the 6-digit code from your email", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.verifyOtp({ email: S.authEmail, token: code, type: "email" });
  S.busy = false;
  if(error){ setMsg("That code did not work. It may have expired. Send a new one.", true); return render(); }
  setMsg(null); /* onAuthStateChange renders the app */
};
window.doSendReset = async ()=>{
  const email = grabEmail();
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  S.authMode = "signin";
  setMsg("Check your inbox. Open the reset link and you can set a new password here.");
  render();
};
window.doSetNewPassword = async ()=>{
  const pass = (document.getElementById("a_pass")||{}).value || "";
  if(pass.length < 8){ setMsg("Password needs at least 8 characters", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.updateUser({ password: pass });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  S.recovery = false; S.authMode = "signin"; setMsg(null);
  await loadProfile(); await refreshCalls(); render();
  toast("New password saved. You are signed in");
};
window.doProfileSetup = async ()=>{
  const u = ((document.getElementById("p_username")||{}).value || "").trim();
  if(u.length < 3){ setMsg("Username needs at least 3 characters", true); return render(); }
  S.busy = true; render();
  const refCode = (((document.getElementById("p_ref")||{}).value)||"").trim();
  const r = await rpc("profile_setup", { p_username: u, p_referral_code: refCode || null });
  S.busy = false;
  if(r.error){ setMsg(r.error, true); return render(); }
  S.profile = { username: r.username, balance: r.balance, isAdmin: !!r.is_admin, referralCode: r.referral_code, kycStatus: r.kyc_status || "not_started", avatarUrl: null };
  setMsg(null); await loadMarkets(); render();
  toast(`Welcome ${r.username}. You have ${N(r.balance)} starter credits`);
};
window.doSignOut = async ()=>{
  await sb.auth.signOut();
  S.profile = null; S.myCalls = []; S.tab = "home"; S.authMode = "signin"; setMsg(null);
  toast("Signed out. Come back soon");
};

/* ---------------- App actions ---------------- */
window.go = async (t)=>{ S.tab=t; S.detail=null; S.trade=null;
  if(t==="home") await loadMarkets();
  if(t==="calls"||t==="insights") await refreshCalls();
  if(t==="insights") await loadBoard();
  if(t==="wallet"){ await loadProfile(); await loadLedger(); }

  const v = parseInt(document.getElementById("stake").value,10);
  if(!v||v<500) return toast("Minimum stake is \u20A6500");
  const r = await rpc("call_place", { p_market_id:S.trade.m.id, p_side:S.trade.side, p_amount:v });
  if(r.error) return toast(r.error);
  S.profile.balance = r.balance; const side=S.trade.side; S.trade=null; S.detail=null;

window.submitMarket = async ()=>{
  const q=document.getElementById("cq").value, c=document.getElementById("cc").value,
        e=document.getElementById("ce").value, s=document.getElementById("cs").value;
  if(q.trim().length<15) return toast("Write a clear yes or no question first");
  if(!e.trim()) return toast("Set a resolution date");
  if(!s.trim()) return toast("Name a public source that settles it");
  const r = await rpc("market_create", { p_question:q, p_category:c, p_ends_on:e, p_source:s });

  await loadMarkets(); S.tab="home"; render();
  toast("Submitted. Your market goes live once our team approves it");
};
window.postComment = async ()=>{

  if(!b.trim()) return;
  const r = await rpc("comment_add", { p_market_id:S.detail.id, p_body:b });
  if(r.error) return toast(r.error);
  await loadComments(S.detail.id); render();
};
window.uploadAvatar = async (input)=>{
  const file = input.files && input.files[0];
  if(!file) return;
  if(file.size > 2 * 1024 * 1024) return toast("Keep your photo under 2MB");
  if(!/^image\/(png|jpeg|webp)$/.test(file.type)) return toast("Use a PNG, JPG or WebP image");
  toast("Uploading your photo\u2026");
  const ext = file.type === "image/png" ? "png" : file.type === "image/webp" ? "webp" : "jpg";
  const path = `${S.session.user.id}/avatar_${Date.now()}.${ext}`;
  const { error } = await sb.storage.from("avatars").upload(path, file, { upsert: true, contentType: file.type });
  if(error) return toast("Upload failed: " + error.message);
  const r = await rpc("profile_avatar_set", { p_path: path });
  if(r.error) return toast(r.error);
  S.profile.avatarUrl = r.avatar_url;
  if(S.overview) S.overview.avatar_url = r.avatar_url;
  render(); toast("Looking sharp. Photo updated");
};

  await loadAdmin(); renderMain();
  toast("Market cancelled. All stakes refunded");
};
window.openDispute = (id, q)=>{ S.dispute = { id, q }; render(); };
window.sendDispute = async ()=>{
  const reason = (document.getElementById("dreason")||{}).value || "";
  const r = await rpc("dispute_open", { p_market_id:S.dispute.id, p_reason:reason });
  if(r.error) return toast(r.error);
  S.dispute = null; render();
  toast("Dispute opened. Our team will review it before settlement");
};

/* ---------------- Session lifecycle ---------------- */
sb.auth.onAuthStateChange(async (event, session)=>{
  S.session = session;
  if(event === "PASSWORD_RECOVERY"){ S.recovery = true; S.authMode = "newpass"; setMsg(null); render(); return; }
  if(event === "SIGNED_IN" || event === "INITIAL_SESSION" || event === "TOKEN_REFRESHED" || event === "USER_UPDATED"){
    if(session){ await loadProfile(); await refreshCalls(); }
    render(); return;
  }
  if(event === "SIGNED_OUT"){ S.profile = null; S.myCalls = []; render(); }
});

(async ()=>{
  try{
    const _rp = new URLSearchParams(location.search).get("ref");
    if(_rp) S.refPrefill = _rp.toUpperCase().slice(0,6);
    const { data } = await sb.auth.getSession();
    S.session = data ? data.session : null;
    await loadMarkets();
    if(S.session){ await loadProfile(); await refreshCalls(); }
  }catch(e){}
  render();
})();
};
</script>
</body>
