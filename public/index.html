<script>
/* Load the Supabase library from our own domain first (immune to CDN
   blockers), with CDN backups, and a helpful message if everything fails. */
(function(){
  function boot(){ if(window.supabase && window.__wananaBoot) window.__wananaBoot(); }
  function fail(){
    var el = document.getElementById("app");
    if(el) el.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;text-align:center;color:#8E95BE;font-family:system-ui;line-height:1.7">Wanana could not load a required component.<br/>A browser extension or privacy shield may be blocking it.<br/>Allow this site in your blocker, or try another browser.</div>';
  }
  function load(src, onerr){
    var s = document.createElement("script");
    s.src = src; s.onload = boot; s.onerror = onerr;
    document.head.appendChild(s);
  }
  window.addEventListener("DOMContentLoaded", function(){
    load("/vendor/supabase.js", function(){
      load("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js", function(){
        load("https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js", fail);
      });
    });
  });
})();

<style>
:root{
  --indigo:#0B0E31;
  --card:#141A47;
  --line:#232B63;
  --orange:#FF7A1A;
  --glow:#FF9A4D;
  --teal:#2DD4BF;
  --coral:#FB7185;
  --text:#F4F6FF;
  --slate:#8E95BE;
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--indigo)}
body{width:100%;background:var(--indigo);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.3}
#app,.shell{width:100%;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
button:disabled{opacity:.55;cursor:wait}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--orange);outline-offset:2px}
input,select,textarea{font-family:inherit;width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:14px}
::placeholder{color:var(--slate);opacity:.75}
img.logo{display:block;height:24px;width:auto}
.avatar{border-radius:50%;background:var(--card);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;color:var(--glow);overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.win-bg{position:fixed;inset:0;background:rgba(5,7,26,.82);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px}
.win-card{position:relative;background:var(--card);border:1px solid var(--line);border-top:4px solid var(--orange);border-radius:12px;max-width:420px;width:100%;padding:30px 24px;text-align:center;overflow:hidden;animation:winpop .35s cubic-bezier(.2,1.4,.4,1)}
@keyframes winpop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.confetti{position:absolute;top:-12px;font-size:15px;animation:confall 2.4s ease-in infinite}
@keyframes confall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(340px) rotate(320deg);opacity:0}}
.win-amt{font-family:var(--disp);font-weight:700;font-size:38px;color:var(--teal);margin:8px 0 2px}

/* ---------- App shell ---------- */
.shell{display:flex;flex-direction:column;padding-bottom:84px}
header.bar{position:sticky;top:0;z-index:30;background:rgba(11,14,49,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-in{width:100%;max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.topnav{display:none;gap:4px;flex:1;justify-content:center}
.topnav button{padding:9px 16px;border-radius:999px;font-weight:600;font-size:13.5px;color:var(--slate)}
.topnav button.on{color:var(--indigo);background:var(--orange)}
.balance{font-family:var(--disp);font-weight:600;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13.5px;white-space:nowrap}
.balance .naira{color:var(--glow)}
main{width:100%;max-width:1200px;margin:0 auto;padding-top:14px}
.narrow{width:100%;max-width:640px;margin:0 auto}

/* ---------- Feed ---------- */
.toolbar{padding:0 16px 12px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 16px 14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--line);color:var(--slate)}
.chip.on{border-color:var(--orange);background:var(--orange);color:var(--indigo)}
.feed{display:flex;flex-wrap:wrap;gap:12px;padding:0 16px 24px}
.feed>.card{width:100%}
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:15px 16px;transition:transform .12s ease}
.card:active{transform:scale(.985)}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.cat{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.09em}
.live{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--teal);letter-spacing:.08em}
.live .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal)}
.q{font-family:var(--disp);font-weight:600;font-size:16.5px;line-height:1.32;margin-bottom:12px}
.bar{position:relative;display:flex;height:7px;border-radius:999px;margin-bottom:12px}
.bar .y{background:var(--teal);border-radius:999px 0 0 999px}
.bar .n{flex:1;background:var(--coral);border-radius:0 999px 999px 0}
.bar .spark{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:var(--orange);border:2.5px solid var(--indigo);box-shadow:0 0 10px rgba(255,122,26,.8)}
.row{display:flex;gap:10px;margin-bottom:11px}
.btn-yes,.btn-no{flex:1;padding:11px 0;border-radius:8px;font-family:var(--disp);font-weight:600;font-size:14px;text-align:center}
.btn-yes{background:rgba(45,212,191,.13);color:var(--teal)}
.btn-no{background:rgba(251,113,133,.13);color:var(--coral)}
.stats{display:flex;justify-content:space-between;font-size:12px;color:var(--slate)}
.stats b{color:var(--text);font-weight:600}
.coin{color:var(--glow)}
.empty{border:1px dashed var(--line);border-radius:8px;text-align:center;color:var(--slate);font-size:14px;padding:28px 16px;width:100%}

/* ---------- Section pages ---------- */
.tabtitle{font-family:var(--disp);font-weight:700;font-size:23px;margin:2px 0 5px}
.sub{color:var(--slate);font-size:13px;margin:0 0 16px;line-height:1.5}
.pad{padding:4px 16px 24px}
label{font-size:11.5px;font-weight:600;color:var(--slate);display:block;margin-bottom:6px;letter-spacing:.02em}
.field{margin-bottom:15px}
.cta{width:100%;padding:15px 0;border-radius:8px;background:var(--orange);color:var(--indigo);font-family:var(--disp);font-weight:700;font-size:15px;text-align:center}
.note{color:var(--slate);font-size:11.5px;margin-top:14px;line-height:1.65}
.statgrid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.stat{flex:1 1 calc(50% - 5px);min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:13px 14px}
.stat .l{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.stat .v{font-family:var(--disp);font-weight:700;font-size:19px;margin-top:4px}
.aicard{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--orange);border-radius:8px;padding:15px 16px;margin-bottom:14px}
.aicard .t{font-family:var(--disp);font-weight:600;color:var(--glow);font-size:13px;margin-bottom:8px}
.aicard p{font-size:13.5px;line-height:1.65;color:var(--text)}
.comment{margin-bottom:11px;font-size:13.5px;line-height:1.5}
.comment b{color:var(--glow);font-weight:600}
.verified{display:inline-flex;align-items:center;gap:4px;color:var(--teal);font-weight:600}

/* ---------- Discussion ---------- */
.pinbox{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:8px;padding:11px 13px;margin-bottom:10px;font-size:13px;line-height:1.6}
.pinbox .pt{font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--glow);margin-bottom:3px}
.cmt{padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.55}
.cmt.reply{margin-left:26px;border-left:2px solid var(--line);padding-left:12px;border-bottom:none}
.cmt .who{color:var(--glow);font-weight:600}
.cmt .removedmsg{color:var(--slate);font-style:italic;font-size:12.5px}
.cmt-acts{display:flex;gap:14px;margin-top:5px;font-size:11.5px;color:var(--slate);flex-wrap:wrap}
.cmt-acts button{color:var(--slate);font-size:11.5px;font-weight:600}
.cmt-acts button.liked{color:var(--orange)}
.borc{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.1em;color:var(--indigo);background:var(--glow);border-radius:999px;padding:1.5px 7px;vertical-align:1.5px;margin-left:5px}
.followbtn{font-size:11.5px;font-weight:700;border:1px solid var(--line);border-radius:999px;padding:5px 12px;color:var(--slate)}
.followbtn.on{color:var(--teal);border-color:var(--teal)}

/* ---------- Ask Wanana support assistant ---------- */
.botlog{max-height:300px;overflow-y:auto;margin-bottom:10px}
.bm{margin-bottom:10px;display:flex}
.bm .bub{max-width:85%;border-radius:12px;padding:9px 13px;font-size:13px;line-height:1.6}
.bm.u{justify-content:flex-end}
.bm.u .bub{background:var(--orange);color:var(--indigo);font-weight:500;border-bottom-right-radius:4px}
.bm.b .bub{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
.botchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.botchips .chip{font-size:11.5px}

/* ---------- Auth ---------- */
.authbox{background:rgba(20,26,71,.55);border:1px solid var(--line);border-radius:12px;padding:18px}
.authmsg{font-size:12.5px;line-height:1.6;color:var(--glow);margin:0 0 12px}
.authmsg.err{color:var(--coral)}
.alink{background:none;color:var(--slate);font-size:12.5px;font-weight:600;text-decoration:underline;text-underline-offset:3px;padding:0}
.alink:hover{color:var(--text)}
.alinks{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:14px}
.otp{letter-spacing:.35em;font-family:var(--disp);font-weight:700;font-size:20px;text-align:center}
.signout{font-size:12.5px;font-weight:600;color:var(--slate);border:1px solid var(--line);border-radius:999px;padding:7px 14px;white-space:nowrap}
.signout:hover{color:var(--coral);border-color:var(--coral)}

/* ---------- Bottom nav (mobile) ---------- */
nav.bottom{position:fixed;bottom:0;left:0;right:0;background:var(--indigo);border-top:1px solid var(--line);display:flex;z-index:40}
nav.bottom button{flex:1;padding:13px 0 calc(15px + env(safe-area-inset-bottom));color:var(--slate);font-weight:600;font-size:11.5px;position:relative}
nav.bottom button.on{color:var(--orange)}
nav.bottom button.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:3px;background:var(--orange);border-radius:0 0 4px 4px}

/* ---------- Sheets / modals ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(4,6,24,.72);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.sheet{width:100%;max-width:520px;max-height:88vh;overflow-y:auto;background:var(--indigo);border:1px solid var(--line);border-bottom:none;border-radius:14px 14px 0 0;padding:20px 18px calc(28px + env(safe-area-inset-bottom))}
.handle{width:40px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 16px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--orange);color:var(--indigo);font-weight:700;font-size:13px;padding:11px 18px;border-radius:999px;z-index:70;max-width:92vw;text-align:center}

/* ---------- Hero / splash ---------- */
.hero{width:100%;min-height:100vh;position:relative;overflow:hidden;display:flex;align-items:center}
.hero-in{position:relative;width:100%;max-width:1200px;margin:0 auto;padding:56px 26px;display:flex;gap:56px;align-items:center}
.hero-copy{width:100%;max-width:560px}
.skill-line{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--slate);margin-bottom:22px}
.hero-logo{width:min(72%,300px);height:auto;display:block}
.hero h1{font-family:var(--disp);font-weight:700;font-size:31px;line-height:1.18;margin:18px 0 12px}
.hero h1 .em{color:var(--orange)}
.hero p.lead{color:var(--slate);font-size:14.5px;line-height:1.65;margin:0 0 26px}
.hero-preview{display:none;flex:1;min-width:0;flex-direction:column;gap:14px}
.hero-preview .card{pointer-events:none}
.preview-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--slate)}
.net{position:absolute;inset:0;pointer-events:none;opacity:.5}

@media (prefers-reduced-motion:reduce){.card{transition:none}.spark{box-shadow:none !important}}

/* ===================== Tablet ≥ 768px ===================== */
@media (min-width:768px){
  .feed>.card{width:calc(50% - 6px)}
  .sheet-bg{align-items:center;padding:24px}
  .sheet{border-radius:14px;border-bottom:1px solid var(--line);padding-bottom:24px}
  .handle{display:none}
  .hero h1{font-size:40px}
  .hero-logo{width:300px}
  .tabtitle{font-size:27px}
  .stat{flex:1 1 calc(25% - 8px)}
}

/* ===================== Desktop ≥ 1024px ===================== */
@media (min-width:1024px){
  .shell{padding-bottom:32px}
  nav.bottom{display:none}
  .topnav{display:flex}
  main{padding-top:22px}
  .feed>.card{width:calc(33.333% - 8px)}
  .card{padding:17px 18px}
  .hero-in{padding:64px 40px}
  .hero-preview{display:flex}
  .hero h1{font-size:46px}
  .hero p.lead{font-size:16px}
  .toolbar{display:flex;gap:12px;align-items:center}
  .toolbar input{max-width:420px}
}
@media (min-width:1280px){
  .hero-in{gap:80px}
}

/* ===================== Interaction layer: lift, glow, press ===================== */
button,.card,input,select,textarea{transition:transform .16s ease,box-shadow .16s ease,background-color .16s ease,border-color .16s ease,color .16s ease,opacity .16s ease,filter .16s ease}
button:not(:disabled):active{transform:scale(.965)}
.cta{padding:17px 0;font-size:16px;box-shadow:0 2px 10px rgba(255,122,26,.22)}
.btn-yes,.btn-no{padding:13px 0;font-size:15px}
.chip{padding:9px 17px}
.topnav button{padding:10px 18px}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,122,26,.16)}
@media (hover:hover){
  .cta:hover:not(:disabled){transform:translateY(-1px);background:var(--glow);box-shadow:0 6px 22px rgba(255,122,26,.4)}
  .btn-yes:hover{transform:translateY(-1px);background:rgba(45,212,191,.24);box-shadow:0 4px 16px rgba(45,212,191,.22)}
  .btn-no:hover{transform:translateY(-1px);background:rgba(251,113,133,.24);box-shadow:0 4px 16px rgba(251,113,133,.22)}
  .chip:hover{border-color:var(--orange);color:var(--text)}
  .chip.on:hover{filter:brightness(1.08);color:var(--indigo)}
  .card[role="button"]:hover{transform:translateY(-2px);border-color:#3A478F;box-shadow:0 10px 26px rgba(4,6,24,.5),0 0 0 1px rgba(255,122,26,.14)}
  .topnav button:hover{color:var(--text);background:var(--card)}
  .topnav button.on:hover{color:var(--indigo);background:var(--glow)}
  .balance:hover{border-color:var(--orange)}
  .alink:hover{color:var(--glow)}
  .signout:hover,.followbtn:hover{border-color:var(--orange);color:var(--text);transform:translateY(-1px)}
  nav.bottom button:hover{color:var(--text)}
  .cmt-acts button:hover{color:var(--glow)}
  .stat:hover{border-color:#3A478F}
}
.shell{position:relative}
.shell::before{content:"";position:fixed;top:-180px;left:50%;transform:translateX(-50%);width:760px;height:420px;background:radial-gradient(closest-side,rgba(255,122,26,.09),transparent 70%);pointer-events:none;z-index:0}
main#main{position:relative;z-index:1;animation:pagein .24s ease}
@keyframes pagein{from{opacity:.55;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sheet{animation:sheetup .3s cubic-bezier(.22,.9,.32,1)}
@keyframes sheetup{from{transform:translateY(24px);opacity:.6}to{transform:translateY(0);opacity:1}}
@media (prefers-reduced-motion:reduce){
  button,.card,input,select,textarea{transition:none}
  main#main,.sheet,.win-card{animation:none}
  button:not(:disabled):active{transform:none}
}

/* ---------- Site footer (every page) ---------- */
.site-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;border-top:1px solid var(--line);padding:18px 0 34px;margin-top:6px}
.sf-left{font-size:12px;color:var(--slate);line-height:1.6}
.sf-socials{display:flex;gap:18px;align-items:center}
.soc{color:var(--slate);display:inline-flex;transition:color .15s ease,transform .15s ease}
.soc:hover{color:var(--orange);transform:translateY(-1px)}
</style>

/* Canonical resolution-date format: "Jul 19, 2026". Picker value (ISO) <-> display */

function dateNice(iso){ /* "2026-07-19" -> "Jul 19, 2026" */

async function rpc(fn, args){
  try{
    const { data, error } = await sb.rpc(fn, args || {});
    if(error) return { error: error.message || "Something went wrong. Try again." };
    return data;
  }catch(e){
    return { error: "Network hiccup. Check your connection and try again." };
  }
}
/* Client error reporting: the first few errors per session are sent home,
   so real-device breakage (especially low-end Android) becomes visible in
   the Admin Health panel. Capped client-side and server-side. */
let __errSent = 0;
function reportClientError(msg, src){
  try{
    if(__errSent >= 5 || !S.session) return;
    __errSent++;
    rpc("client_error_log", { p_message: String(msg||"Unknown error").slice(0,500), p_source: String(src||"").slice(0,200) });
  }catch(e){}
}
window.addEventListener("error", e => reportClientError(e.message, (e.filename||"") + ":" + (e.lineno||"")));

/* Wanana AI insight engine: rule-based today, API-pluggable later. */
const wananaAI = {
  pulse(m){
    const y = yesPct(m); const pot = m.yes_pool + m.no_pool;
    const pots = S.markets.map(x=>x.yes_pool+x.no_pool).sort((a,b)=>a-b);
    const mid = pots.length ? pots[Math.floor(pots.length/2)] : 0;
    const parts = [];
    if(y >= 62) parts.push(`The crowd is leaning YES at ${y}%.`);
    else if(y <= 38) parts.push(`The crowd is leaning NO at ${100-y}%.`);
    else parts.push("The crowd is split down the middle. Somebody is wrong.");
    if(pot === 0) parts.push("Empty pool. The first call names the price.");
    else if(pot >= mid * 1.5 && pots.length > 2) parts.push(`Serious pool at ${N(pot)}. Conviction is high here.`);
    else if(pot < mid && pots.length > 2) parts.push("Quiet pool so far. Early readers get the best prices.");
    else parts.push(`Pool sits at ${N(pot)}.`);
    if(S.comments.length >= 5) parts.push("The discussion is heating up. Read the takes before you call.");
    parts.push(`Settles against ${esc(m.source)}.`);
    return parts.join(" ");
  },
  edge(calls){
    const settled = calls.filter(c=>c.status==="settled" && c.outcome);
    if(settled.length === 0)
      return "Make your calls and let a few markets settle. Wanana AI starts mapping where your reads are sharpest, category by category.";
    const byCat = {};
    settled.forEach(c=>{ const b = byCat[c.category] = byCat[c.category] || {n:0,w:0}; b.n++; if(c.side===c.outcome) b.w++; });
    const ranked = Object.entries(byCat).map(([cat,b])=>({cat, n:b.n, rate:Math.round(b.w*100/b.n)})).sort((a,b)=>b.rate-a.rate);
    const best = ranked[0]; const wins = settled.filter(c=>c.side===c.outcome).length;
    const overall = Math.round(wins*100/settled.length);
    let line = `Across ${settled.length} settled calls your read rate is ${overall}%.`;
    if(best && best.n >= 2) line += ` Your sharpest category is ${best.cat} at ${best.rate}%. Lean into what you actually know.`;
    else line += " A few more settled calls and the category picture gets clear.";
    if(ranked.length > 1 && ranked[ranked.length-1].rate < 40) line += ` ${ranked[ranked.length-1].cat} has not been kind to you. The crowd sees something there that you do not, yet.`;
    return line;
  },
};

/* ---------------- Wanana support assistant ----------------

  ],
  topics: [
    ["make_a_call", /how[^.?!]{0,15}(make|place)[^.?!]{0,10}call|how do i (play|stake|start)/i, "Open any live market, tap Call YES or Call NO, and stake at least \u20A6500 in demo credits. The YES/NO split you see is the live crowd price. The crowd sets it, not a house. The best returns come from calling early and being right."],
    ["demo_wallet", /demo (wallet|balance|credit)|wallet work|ngn.?demo|real money|is this real|cash value/i, "Every balance on Wanana today is NGN_DEMO: demo credits with no cash value. You get starter credits when you sign up, and everything you stake or win is demo. Real-money features only arrive after licensing, identity verification and payment review are complete."],
    ["payments", /payment|deposit|withdraw|paystack|flutterwave|cash out|top up|fund my/i, "Payments are not live yet, on purpose. Wanana switches on real deposits and withdrawals only after licensing, full KYC and payment review are done. Until then everything runs on NGN_DEMO credits, so you can learn the full game risk-free."],
    ["create_market", /creat\w*[^.?!]{0,12}market|market creation|post[^.?!]{0,10}(question|market)|my own market/i, "Go to Create, write a clear yes-or-no question about a real-world event, set the resolution date, and name a public source that settles it: official results, announcements or published records. Every market is reviewed before it goes live, and creators earn 1% of the pool when it settles."],
    ["review", /why[^.?!]{0,40}review|go(es)? through review|market[^.?!]{0,12}(pending|approved|rejected|stuck)|how long[^.?!]{0,15}review/i, "Every market goes through review before it goes live. That keeps markets clear, verifiable and inside the rules: no financial markets, no harmful topics, always a named public source. Clean markets are often auto-approved in seconds; anything unclear waits for the team."],
    ["verified_outcome", /verified outcome|how[^.?!]{0,15}(verif|resolv)|who decides|outcome work/i, "When an event concludes, the outcome is checked against the public source named when the market was created. The market then enters a 48-hour dispute window before any payout moves. Discussion and comments never influence official settlement. Only the named public source does."],
    ["dispute", /dispute|disagree[^.?!]{0,20}outcome|wrong (result|outcome)|challenge (the|an) outcome|48.?hour/i, "After an outcome is proposed, a 48-hour dispute window opens and every participant is notified. If you have evidence the outcome is wrong, open a dispute from Your calls and point to the public source. Payouts cannot move before the window closes, and disputed markets always wait for human review."],
    ["settlement", /settlement|payout|when do i get paid|share of the pool|winnings|how do (i|players) (make|win)/i, "When the dispute window closes, settlement runs automatically. Winners share 94% of the pool in proportion to their stakes. Wanana takes 5% and the market creator earns 1%. Your share lands in your demo balance and shows in your ledger."],
    ["referral", /referr?al|invite|refer a friend|invite code/i, "Your invite code lives in your Profile. Share it, and when your person signs up and makes their first call, \u20A65,000 in demo credits lands in your balance. One reward per referred player, all in NGN_DEMO."],
    ["kyc", /\bkyc\b|verify[^.?!]{0,12}identity|\bbvn\b|\bnin\b|identity verification/i, "During open beta, identity verification is a placeholder: you submit your BVN or NIN and Wanana keeps only the last 4 digits, never the full number. Full KYC arrives with licensing, before any real-money feature switches on."],

    ["comments", /comment|discussion|community rules|report[^.?!]{0,12}(comment|post)/i, "Every market has a discussion. Keep it sound: no hate, harassment, personal attacks, private information, impersonation, spam or financial-market talk. Like useful takes, reply, and report anything harmful. The team reviews every report. Comments never influence settlement."],

function pwField(id, label, ac, ph){
  return `<div class="field"><label>${label}</label>
    <div style="position:relative">
      <input id="${id}" type="password" autocomplete="${ac}" placeholder="${ph}" style="padding-right:64px" />
      <button type="button" class="alink" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px" onclick="togglePw('${id}',this)" aria-label="Show password">Show</button>
    </div></div>`;
}
window.togglePw = (id, btn)=>{
  const el = document.getElementById(id); if(!el) return;
  const show = el.type === "password";
  el.type = show ? "text" : "password";
  btn.textContent = show ? "Hide" : "Show";
  btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
};
function authMsgHtml(){
  return S.authMsg ? `<p class="authmsg ${S.authMsg.err?"err":""}">${esc(S.authMsg.text)}</p>` : "";
}

  if(S.authMode === "otp") return `

        <button class="alink" onclick="authGo('reset')">Forgot password?</button>
      </div>

}

        const won = c.status==="settled" && c.outcome===c.side;

          : c.status==="cancelled" ? "Refunded"
          : c.status==="dispute_window" ? "Dispute window"

          : c.status==="closed" ? "Awaiting result"

            <span style="color:var(--slate)">Staked ${N(c.amount)}</span>
            <span style="color:${won||["live","dispute_window"].includes(c.status)?"var(--glow)":"var(--slate)"};font-weight:700">${stateLabel}</span>

      <div style="background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:14px">

        <div style="font-size:12.5px;color:var(--slate);line-height:1.6;margin-bottom:${S.myMarkets.length?"12px":"0"}">Every market you created, and where it is in the pipeline. Creators earn 1% of the settled pool.</div>
        ${S.myMarkets.length===0 ? `<div style="font-size:12.5px;color:var(--slate)">Nothing yet. <button class="alink" onclick="go('create')">Create your first market</button></div>` :

            const scol = {pending_review:"var(--orange)",approved:"var(--glow)",live:"var(--teal)",closed:"var(--slate)",in_verification:"var(--glow)",dispute_window:"var(--coral)",settled:"var(--teal)",rejected:"var(--coral)",cancelled:"var(--slate)",draft:"var(--slate)"}[m.status]||"var(--slate)";

  admin(){

      const acts = [];

        acts.push(`<button class="btn-no" onclick="adminAct('admin_reject_market',${m.id})">Reject</button>`); }
      if(m.status==="live"){ acts.push(`<button class="btn-no" onclick="adminAct('admin_close_market',${m.id})">Close calls</button>`);
        acts.push(`<button class="btn-yes" onclick="adminAct('admin_start_verification',${m.id})">Start verification</button>`); }
      if(m.status==="closed"){ acts.push(`<button class="btn-yes" onclick="adminAct('admin_start_verification',${m.id})">Start verification</button>`); }
      if(m.status==="in_verification"){ acts.push(`<button class="btn-yes" onclick="adminOutcome(${m.id},'YES')">Outcome YES</button>`);
        acts.push(`<button class="btn-no" onclick="adminOutcome(${m.id},'NO')">Outcome NO</button>`); }

      if(["live","closed","in_verification","dispute_window"].includes(m.status)) acts.push(`<button class="chip" style="flex:0 0 auto;padding:11px 14px" onclick="adminPin(${m.id})">Pin update</button>`);

      return `<div class="card" style="margin-bottom:12px">
        <div class="meta"><span class="cat" style="color:${badge(m.status)}">${m.status.replace(/_/g," ").toUpperCase()}</span>

        </div>
        <div class="row" style="margin-bottom:0">${acts.join("")}</div>
      </div>`;
    };

      ${A.panel==="markets" ? `
        <div class="chips" style="padding-left:0">
          ${["all","pending_review","live","closed","in_verification","dispute_window","rejected"].map(s=>`<button class="chip ${A.fS===s?"on":""}" onclick="S.admin.fS='${s}';renderMain()">${s==="all"?"All":s==="dispute_window"?"Settlement queue":s.replace(/_/g," ")}</button>`).join("")}
          <select onchange="S.admin.fC=this.value;renderMain()" style="width:auto;padding:7px 12px;border-radius:999px;font-size:13px">
            ${["all"].concat(CATS.slice(1)).map(c=>`<option ${A.fC===c?"selected":""}>${c}</option>`).join("")}

          return L.length ? L.map(mk).join("") : `<div class="empty">Nothing in this queue right now.</div>`;})()}` : ""}

        </div>`).join("") : `<div class="empty">No open disputes.</div>`) : ""}
      ${A.panel==="cancelreqs" ? (A.cancelReqs.length ? A.cancelReqs.map(r=>`<div class="card" style="margin-bottom:12px">

      ${A.panel==="ledger" ? `<input placeholder="Filter by user, type or note" value="${esc(A.q)}" onchange="S.admin.q=this.value;renderMain()" style="margin-bottom:10px" />

          <span><b style="color:${l.amount>0?"var(--teal)":"var(--coral)"}">${l.amount>0?"+":""}${N(l.amount)}</b> <span style="color:var(--slate)">by ${esc(l.created_by)}</span></span>
        </div>`).join("") || "No entries yet."}</div>` : ""}
      ${A.panel==="users" ? `<div style="font-size:12.5px;color:var(--slate);margin-bottom:10px">${A.users.length} users · ${A.users.reduce((s,u)=>s+u.calls,0)} calls · ${A.users.reduce((s,u)=>s+u.markets,0)} markets · ${A.users.filter(u=>u.kyc_status==="pending").length} KYC pending</div>
      <div class="card">${A.users.map(u=>`<div onclick="openUserDetail('${esc(u.username)}')" role="button" tabindex="0" style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:12.5px;flex-wrap:wrap;cursor:pointer">
          <span style="display:flex;align-items:center;gap:8px">${avatarHtml(null,u.username,24)}<span><b style="color:var(--glow)">${esc(u.username)}</b>${u.is_admin?' <span class="cat" style="color:var(--orange)">ADMIN</span>':""}${u.kyc_status==="pending"?' <span class="cat" style="color:var(--glow)">KYC PENDING</span>':""} <span style="color:var(--slate)">${u.calls} calls · ${u.markets} markets</span></span></span>
          <b>${N(u.balance)} ›</b>
        </div>`).join("") || "No users yet."}</div>` : ""}
      ${A.panel==="comments" ? (()=>{
        const f = A.fCm;
        const L = A.comments.filter(c =>
          f==="all" ? true :
          f==="reported" ? c.open_reports>0 :
          f==="unreviewed" ? !c.reviewed :
          c.status===f);
        return `<div class="chips" style="padding-left:0">
          ${[["all","All"],["reported",`Reported (${A.comments.filter(c=>c.open_reports>0).length})`],["unreviewed","Unreviewed"],["hidden","Hidden"],["removed","Removed"]].map(([k,l])=>`<button class="chip ${A.fCm===k?"on":""}" onclick="S.admin.fCm='${k}';renderMain()">${l}</button>`).join("")}
        </div>
        ${L.map(c=>`<div class="card" style="margin-bottom:10px">
          <div class="meta"><span class="cat" style="color:${c.status==="visible"?"var(--teal)":c.status==="hidden"?"var(--glow)":"var(--coral)"}">${c.status.toUpperCase()}</span>
            ${c.open_reports>0?`<span class="cat" style="color:var(--coral)">\u26A0 ${c.open_reports} OPEN REPORT${c.open_reports>1?"S":""}</span>`:""}
            ${c.reviewed?`<span class="cat" style="color:var(--slate)">REVIEWED</span>`:""}</div>
          <div style="font-size:13px;margin-bottom:4px"><b style="color:var(--glow)">${esc(c.username)}</b> ${esc(c.body||"")}</div>
          <div style="font-size:11.5px;color:var(--slate);margin-bottom:8px">market #${c.market_id} \u00b7 ${esc(c.question||"")} \u00b7 \u25B2 ${c.like_count||0}${c.moderated_by?` \u00b7 last action by ${esc(c.moderated_by)} (${esc(c.moderation_reason||"")})`:""}</div>
          ${(c.report_reasons||[]).map(r=>`<div style="font-size:11.5px;color:var(--coral);margin-bottom:4px">\u26A0 ${esc(r.reporter)}: ${esc(r.reason)} <span style="color:var(--slate)">(${r.status})</span></div>`).join("")}
          <div class="row" style="margin-bottom:0">
            ${c.status==="visible"?`<button class="chip" onclick="adminModC(${c.id},'hide')">Hide</button><button class="chip" onclick="adminModC(${c.id},'remove')">Remove</button>`:`<button class="chip" onclick="adminModC(${c.id},'restore')">Restore</button>`}
            ${!c.reviewed?`<button class="chip" onclick="adminModC(${c.id},'review')">Mark reviewed</button>`:""}
          </div>
        </div>`).join("") || `<div class="empty">Nothing in this queue.</div>`}`;})() : ""}
      ${A.panel==="audit" ? `<select onchange="S.admin.fA=this.value;renderMain()" style="margin-bottom:10px;width:auto">
        ${["all","market_approved","market_rejected","market_closed","market_cancelled","verification_started","outcome_entered","market_settled","wallet_adjustment","dispute_decision","admin_role_change","kyc_decision","comment_moderation","pinned_update"].map(a=>`<option ${A.fA===a?"selected":""}>${a}</option>`).join("")}
      </select>
      <div class="card">${A.audit.filter(a=>A.fA==="all"||a.action===A.fA).map(a=>`<div style="padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px">
          <b style="color:var(--glow)">${esc(a.actor)}</b> ${a.action.replace(/_/g," ")}${a.market_id?` · market #${a.market_id}`:""}${a.target?` · ${esc(a.target)}`:""}
          <span style="color:var(--slate)"> · ${new Date(a.created_at).toLocaleString()}</span>
        </div>`).join("") || "No admin actions yet."}</div>` : ""}
      ${A.panel==="health" ? (()=>{
        const h = A.health;
        if(!h) return `<div class="empty">Health data unavailable. Refresh the Admin tab.</div>`;
        const age = Number(h.settle_age_seconds||0);
        const okBeat = age < 1200; /* two missed 10-min runs = red */
        const mins = Math.round(age/60);
        const beatLabel = age < 90 ? "moments ago" : mins < 60 ? mins + " min ago" : Math.round(mins/60) + "h " + (mins%60) + "m ago";
        const det = h.settle_detail || {};
        return `
        <div class="card" style="margin-bottom:12px;border-top:3px solid ${okBeat?"var(--teal)":"var(--coral)"}">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <div style="font-family:var(--disp);font-weight:600;font-size:14px"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${okBeat?"var(--teal)":"var(--coral)"};margin-right:7px;${okBeat?"box-shadow:0 0 6px var(--teal)":""}"></span>Settlement sweep</div>
            <span style="font-size:12.5px;color:${okBeat?"var(--slate)":"var(--coral)"};font-weight:${okBeat?"400":"700"}">${okBeat ? "Last run " + beatLabel : "\u26A0 Last run " + beatLabel + " - check pg_cron"}</span>
          </div>
          <div style="font-size:12px;color:var(--slate);margin-top:6px">Runs every 10 minutes. Last sweep: ${det.settled??0} settled \u00b7 ${det.moved_to_verification??0} moved to verification \u00b7 ${det.held_for_review??0} held for dispute review.</div>
        </div>
        <div class="card" style="margin-bottom:12px">
          <div style="font-family:var(--disp);font-weight:600;font-size:14px;margin-bottom:6px">Email pipeline</div>
          <div style="font-size:12.5px;color:var(--slate)">Last email sent: ${h.last_email_sent ? new Date(h.last_email_sent).toLocaleString() : "none yet"} \u00b7 ${h.emails_pending??0} pending in queue${Number(h.emails_pending)>20?` <span style=\"color:var(--coral)\">\u26A0 queue is backing up</span>`:""}</div>
        </div>
        <div class="statgrid">
          <div class="stat"><div class="l">Signups \u00b7 7d</div><div class="v">${h.signups_7d??0}</div></div>
          <div class="stat"><div class="l">Calls \u00b7 7d</div><div class="v">${h.calls_7d??0}</div></div>
          <div class="stat"><div class="l">Markets \u00b7 7d</div><div class="v">${h.markets_7d??0}</div></div>
          <div class="stat"><div class="l">Shares \u00b7 7d</div><div class="v">${h.shares_7d??0}</div></div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
            <div style="font-family:var(--disp);font-weight:600;font-size:14px">Client errors \u00b7 24h</div>
            <span style="font-size:12.5px;color:${Number(h.errors_24h)>0?"var(--glow)":"var(--slate)"}">${h.errors_24h??0} recorded</span>
          </div>
          ${(h.recent_errors||[]).length ? h.recent_errors.map(e=>`<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:12px">
            <span style="color:var(--coral)">${esc(e.msg)}</span>
            <div style="color:var(--slate);margin-top:2px">${esc(e.who||"")} \u00b7 ${esc(e.src||"")} \u00b7 ${esc(e.at||"")}</div>
          </div>`).join("") : `<div style="font-size:12px;color:var(--slate)">Nothing reported. Quiet is good.</div>`}
        </div>
        <p class="note">Signups, calls, markets and shares are counted from the events table (written automatically). Client errors are reported by the app itself, capped per user. This panel is read-only and admin-only.</p>`;
      })() : ""}
    </div>`;
  },
};

function commentHtml(c, isReply){
  if(c.status === "removed")
    return `<div class="cmt ${isReply?"reply":""}"><span class="removedmsg">This comment was removed because it did not meet Wanana\u2019s community rules.</span></div>`;
  const when = new Date(c.created_at).toLocaleDateString(undefined,{month:"short",day:"numeric"});
  return `<div class="cmt ${isReply?"reply":""}">
    <span class="who">${esc(c.username)}</span>${c.is_oracle?`<span class="borc">ORACLE</span>`:""} ${esc(c.body)}
    <div class="cmt-acts">
      <button class="${c.liked_by_me?"liked":""}" onclick="likeC(${c.id})" aria-label="Like">\u25B2 ${c.like_count||0}</button>
      ${!isReply?`<button onclick="replyC(${c.id})">Reply</button>`:""}
      ${c.is_mine?`<button onclick="delC(${c.id})">Delete</button>`:`<button onclick="reportC(${c.id})">Report</button>`}
      <span>${when}</span>
    </div>
  </div>`;
}
function discussionBlock(){
  const d = S.disc || { pinned:[], followers:0, following:false };
  const tops = S.comments.filter(c=>!c.parent_id);
  const sorted = S.discSort==="top"
    ? tops.slice().sort((a,b)=>((b.like_count||0)-(a.like_count||0)) || (new Date(b.created_at)-new Date(a.created_at)))
    : tops.slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const replies = id => S.comments.filter(c=>c.parent_id===id);
  const visCount = S.comments.filter(c=>c.status==="visible").length;
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap">
      <div style="font-family:var(--disp);font-weight:600;font-size:14px">Discussion${visCount?` (${visCount})`:""}</div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="followbtn ${d.following?"on":""}" onclick="followM(${S.detail.id})">${d.following?"\u2713 Following":"Follow market"}${d.followers?` \u00b7 ${d.followers}`:""}</button>
        <button class="alink" style="font-size:11.5px" onclick="S.help=true;S.helpTab='ask';render()">Help</button>
      </div>
    </div>
    ${d.pinned.map(p=>`<div class="pinbox"><div class="pt">OFFICIAL \u00b7 WANANA TEAM</div>${esc(p.body)}</div>`).join("")}
    ${tops.length>1?`<div class="chips" style="padding-left:0;margin-bottom:4px">
      <button class="chip ${S.discSort==="top"?"on":""}" onclick="S.discSort='top';render()">Top</button>
      <button class="chip ${S.discSort==="new"?"on":""}" onclick="S.discSort='new';render()">Newest</button>
    </div>`:""}
    <div id="comments">${sorted.map(c=>commentHtml(c,false)+replies(c.id).map(r=>commentHtml(r,true)).join("")).join("") || `<div style="color:var(--slate);font-size:13px;margin-bottom:10px">No takes yet. Drop the first one.</div>`}</div>
    ${S.replyTo?`<div style="font-size:11.5px;color:var(--glow);margin-top:8px">Replying to ${esc(S.replyTo.name)} \u00b7 <button class="alink" style="font-size:11.5px" onclick="S.replyTo=null;render()">cancel</button></div>`:""}
    <div style="display:flex;gap:8px;margin-top:8px">
      <input id="cbody" maxlength="500" placeholder="${S.replyTo?"Write your reply":"Share your take"}" style="flex:1" />
      <button onclick="postComment()" style="padding:0 18px;background:var(--orange);color:var(--indigo);font-family:var(--disp);font-weight:700;font-size:13px;border-radius:8px">Post</button>
    </div>
    <p class="note" style="margin:10px 0 0">Be sound. No hate, harassment, personal attacks, private information or financial-market talk. Comments never influence official settlement.</p>`;
}

function detailSheet(){
  const m = S.detail; const y = yesPct(m);
  return `<div class="sheet-bg" onclick="closeDetail()">
    <div class="sheet" onclick="event.stopPropagation()" role="dialog" aria-label="Market detail">
      <div class="handle"></div>
      <div class="meta"><span class="cat">${m.category}</span><span class="live"><span class="dot"></span>LIVE</span></div>
      <div class="q" style="font-size:19.5px">${esc(m.question)}</div>
      <div class="bar" style="height:9px"><div class="y" style="width:${y}%"></div><div class="n"></div><div class="spark" style="left:${y}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-family:var(--disp);font-size:13.5px;font-weight:600;margin-bottom:16px">
        <span style="color:var(--teal)">YES ${y}%</span><span style="color:var(--coral)">NO ${100-y}%</span></div>
      ${(()=>{ const mine = S.myCalls.filter(c=>c.market_id===m.id);
        if(!mine.length) return "";
        const yes = mine.filter(c=>c.side==="YES").reduce((s,c)=>s+c.amount,0);
        const no  = mine.filter(c=>c.side==="NO").reduce((s,c)=>s+c.amount,0);
        const bits = [];
        if(yes) bits.push(`<b style="color:var(--teal)">${N(yes)} on YES</b>`);
        if(no)  bits.push(`<b style="color:var(--coral)">${N(no)} on NO</b>`);
        return `<div style="background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:14px">
          <span style="color:var(--slate)">Your position:</span> ${bits.join(`<span style="color:var(--slate)"> · </span>`)}
          <span style="color:var(--slate)"> across ${mine.length} call${mine.length>1?"s":""}. New calls join at the live crowd price and add to your position.</span>
        </div>`; })()}
      <div class="row">
        <button class="btn-yes" style="background:var(--teal);color:var(--indigo)" onclick="openTrade(${m.id},'YES')">Call YES</button>
        <button class="btn-no" style="background:var(--coral);color:var(--indigo)" onclick="openTrade(${m.id},'NO')">Call NO</button>
      </div>
      <div style="background:var(--card);border:1px solid var(--line);border-radius:8px;padding:13px 14px;font-size:12.5px;color:var(--slate);line-height:1.65;margin-bottom:16px">
        <span class="verified">\u2713 Verified settlement</span> \u00b7 outcome confirmed via ${esc(m.source)}. Pool ${N(m.yes_pool+m.no_pool)} \u00b7 created by ${esc(m.creator)}. Winners split the pool by stake. Wanana takes 5%, the creator earns 1%, and payouts release after a 48 hour dispute window.
      </div>
      <div class="aicard"><div class="t">Market Pulse · Wanana AI</div><p>${wananaAI.pulse(m)}</p></div>
      <div style="margin-bottom:16px"><button class="chip" onclick="copyMarketLink()">Share this market \u00b7 Copy link</button></div>
      ${discussionBlock()}
    </div></div>`;
}

function victorySheet(){
  const wins = S.wins;
  const total = wins.reduce((s,w)=>s+Number(w.amount),0);
  const lastId = Math.max(...wins.map(w=>Number(w.ledger_id)));
  const onlyCreator = wins.every(w=>w.kind==="creator");
  const bits = ["\u{1F389}","\u{2728}","\u{1F3C6}","\u{1F525}","\u{2B50}","\u{1F389}","\u{2728}","\u{1F3C6}"];
  const conf = bits.map((b,i)=>`<span class="confetti" style="left:${8+i*12}%;animation-delay:${(i*0.28).toFixed(2)}s">${b}</span>`).join("");
  return `<div class="win-bg" onclick="winsSeen(${lastId})">
    <div class="win-card" onclick="event.stopPropagation()">
      ${conf}
      <div style="font-family:var(--disp);font-weight:700;font-size:22px">${onlyCreator ? "Your market paid out" : "You called it"} \u{1F389}</div>
      <div class="win-amt">+\u20A6${total.toLocaleString("en-NG")}</div>
      <div style="font-size:12px;color:var(--slate);margin-bottom:14px">${wins.length>1 ? wins.length+" settlements landed in your balance" : "landed in your balance"}</div>
      ${wins.map(w=>`<div style="text-align:left;font-size:12.5px;padding:8px 0;border-top:1px solid var(--line)">
        <span style="color:${w.kind==="creator"?"var(--glow)":"var(--teal)"};font-weight:700">${w.kind==="creator"?"Creator reward":"Nice read"} +\u20A6${Number(w.amount).toLocaleString("en-NG")}</span>
        <span style="color:var(--slate)"> \u00b7 ${esc(w.question||"")}${w.outcome ? " \u00b7 verified " + w.outcome : ""}</span>
      </div>`).join("")}
      <button class="cta" style="margin-top:16px" onclick="winsSeen(${lastId})">Collect am</button>
      <p class="note" style="margin-bottom:0">Every settlement is verified against a public source, with a 48 hour dispute window first.</p>
    </div></div>`;
}

function helpSheet(){
  const qa = [
    ["What is Wanana?",
     "A peer prediction marketplace and game of skill. Someone posts a real-world yes-or-no question, the crowd stakes demo credits on each side, and when the outcome is verified against a public source, whoever called it right is paid from the pool. Wanana never plays against you. We are the referee, not the house."],
    ["How do calls and payouts work?",
     "Pick a market, choose YES or NO, and stake at least \u20A6500 in demo credits. The split of the pool is the live crowd price. When the market settles, winners share the pool in proportion to their stakes. Wanana takes 5% and the market creator earns 1%."],
    ["Is this real money?",
     "No. Wanana is in open beta and every balance is a demo credit balance (NGN_DEMO) with no cash value. Real-money features only arrive after licensing, identity verification (KYC) and payment review are complete."],
    ["How are results verified, and what if I disagree?",
     "Every market names a public source when it is created. When the event concludes, the outcome is checked against that source and a 48-hour dispute window opens, and every participant is emailed. If you think the outcome is wrong, open a dispute from Your calls with your evidence. Payouts are impossible before the window closes, and disputed markets always wait for human review."],
    ["Something is not working. How do I reach a person?",
     'Email <a href="mailto:support@wanana.africa" style="color:var(--glow)">support@wanana.africa</a> and a human will get back to you. Include your Oracle name and, if it is about a market, the market question.'],
  ];
  const chips = ["What is Wanana?","How do payments work?","How does settlement work?","How do referrals work?"];
  const askHtml = `
    <div class="botlog">${S.chat.length ? S.chat.map(m=>`<div class="bm ${m.who}"><div class="bub">${m.who==="u"?esc(m.text):m.text}</div></div>`).join("") : `<div class="bm b"><div class="bub">Hi, I am Wanana\u2019s support assistant. Ask me how markets, calls, demo credits, settlement or disputes work. I never pick calls and never give financial advice. The read is always yours.</div></div>`}</div>
    <div class="botchips">${chips.map(c=>`<button class="chip" onclick="botAsk(this.textContent)">${c}</button>`).join("")}</div>
    <div style="display:flex;gap:8px">
      <input id="botq" maxlength="300" placeholder="Ask about Wanana" style="flex:1" onkeydown="if(event.key==='Enter')botSend()" aria-label="Ask Wanana a question" />
      <button onclick="botSend()" style="padding:0 18px;background:var(--orange);color:var(--indigo);font-family:var(--disp);font-weight:700;font-size:13px;border-radius:8px">Ask</button>
    </div>
    <p class="note" style="margin:10px 0 0">This assistant explains the product only. It never recommends calls, never guarantees outcomes, and never gives financial, legal or medical advice. Need a human? Email <a href="mailto:support@wanana.africa" style="color:var(--glow)">support@wanana.africa</a>.</p>`;
  const faqHtml = qa.map(([q,a])=>`<div style="margin-bottom:16px">
        <div style="font-family:var(--disp);font-weight:600;font-size:14px;color:var(--glow);margin-bottom:5px">${q}</div>
        <div style="font-size:13px;line-height:1.65;color:var(--text)">${a}</div>
      </div>`).join("") + `<p class="note">More detail lives in <a href="/legal.html" style="color:var(--slate)">Legal &amp; safety</a>: Terms, Privacy, Responsible Play, Market Rules, and Dispute &amp; Settlement Rules. 18+ only. Play within your limit.</p>`;
  return `<div class="sheet-bg" style="z-index:70" onclick="S.help=false;render()">
    <div class="sheet" onclick="event.stopPropagation()" role="dialog" aria-label="Help">
      <div class="handle"></div>
      <div style="font-family:var(--disp);font-weight:700;font-size:18px;margin-bottom:12px">Help</div>
      <div class="chips" style="padding-left:0">
        <button class="chip ${S.helpTab!=="faq"?"on":""}" onclick="S.helpTab='ask';render()">Ask Wanana</button>
        <button class="chip ${S.helpTab==="faq"?"on":""}" onclick="S.helpTab='faq';render()">FAQ</button>
      </div>
      ${S.helpTab==="faq" ? faqHtml : askHtml}
    </div></div>`;

    <div class="sheet" onclick="event.stopPropagation()" role="dialog" aria-label="${mode}">

/* ---------------- URL routing ---------------- */
const TAB_PATH = { home:"/", insights:"/insights", create:"/create", calls:"/calls", wallet:"/balance", profile:"/profile", admin:"/admin" };
function slugify(q){ return String(q||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,60); }
/* Arena deep links: /arena/football-arena etc. Accepts both the arena skin
   name and the raw category name as slugs. Display names only - category
   values and legal vocabulary never change. */
const ARENA_ROUTES = (()=>{ const m = {}; CATS.slice(1).forEach(c=>{ m[slugify(ARENA[c]||c)] = c; m[slugify(c)] = c; }); return m; })();
function routeFromPath(){
  const p = location.pathname.replace(/\/+$/,"") || "/";
  const mkt = p.match(/^\/market\/(\d+)/);
  if(mkt) return { tab:"home", marketId: parseInt(mkt[1],10), cat: null };
  const ar = p.match(/^\/arena\/([a-z0-9-]+)/);
  if(ar && ARENA_ROUTES[ar[1]]) return { tab:"home", marketId: null, cat: ARENA_ROUTES[ar[1]] };
  const seg = p.split("/")[1] || "";
  const map = { "":"home", "market":"home", "markets":"home", "arena":"home", "insights":"insights", "create":"create", "calls":"calls", "balance":"wallet", "wallet":"wallet", "profile":"profile", "admin":"admin" };
  return { tab: map[seg] || "home", marketId: null, cat: null };
}
function syncUrl(replace){
  let path;
  if(S.detail){ const s = slugify(S.detail.question); path = "/market/" + S.detail.id + (s ? "-" + s : ""); }
  else if(S.tab === "home" && S.cat && S.cat !== "All") path = "/arena/" + slugify(ARENA[S.cat]||S.cat);
  else path = TAB_PATH[S.tab] || "/";
  if(location.pathname !== path){
    try{ if(replace) history.replaceState({}, "", path); else history.pushState({}, "", path); }catch(e){}
  }
}
window.setCat = (c)=>{ S.cat = c; if(S.tab === "home" && !S.detail) syncUrl(); renderMain(); };
window.closeDetail = ()=>{ S.detail=null; syncUrl(); render(); };

  const r = routeFromPath();

  if(r.marketId){ S.tab = "home"; await openDetail(r.marketId, true); }

});

  if(body===null || !body.trim()) return;
  const r = await rpc("admin_pin_update", { p_market_id:id, p_body:body });
  if(r.error) return toast(r.error);
  toast("Pinned. Logged to the audit trail");
};
window.botAsk = (q)=>{ const el = document.getElementById("botq"); if(el) el.value = q; window.botSend(); };
window.botSend = async ()=>{
  const el = document.getElementById("botq");
  const q = (el ? el.value : "").trim();
  if(!q) return;
  S.chat.push({ who:"u", text:q });
  render();
  const a = await wananaBot.answer(q);
  S.chat.push({ who:"b", text:a.text });
  if(a.topic) rpc("chatbot_log_topic", { p_topic: a.topic });
  render();
  const log = document.querySelector(".botlog"); if(log) log.scrollTop = log.scrollHeight;
};
window.checkWins = async ()=>{
  if(!S.session || !S.profile) return;
  const w = await rpc("wins_unseen");
  if(Array.isArray(w) && w.length){ S.wins = w; render(); }
};
window.winsSeen = async (lastId)=>{
  S.wins = []; render();
  await rpc("wins_mark_seen", { p_last_id: lastId });
  await loadProfile(); render();
};
window.uploadAvatar = async (input)=>{
  const file = input.files && input.files[0];
  if(!file) return;
  if(file.size > 2 * 1024 * 1024) return toast("Keep your photo under 2MB");
  if(!/^image\/(png|jpeg|webp)$/.test(file.type)) return toast("Use a PNG, JPG or WebP image");
  toast("Uploading your photo\u2026");
  const ext = file.type === "image/png" ? "png" : file.type === "image/webp" ? "webp" : "jpg";
  const path = `${S.session.user.id}/avatar_${Date.now()}.${ext}`;
  const { error } = await sb.storage.from("avatars").upload(path, file, { upsert: true, contentType: file.type });
  if(error) return toast("Upload failed: " + error.message);
  const r = await rpc("profile_avatar_set", { p_path: path });
  if(r.error) return toast(r.error);
  S.profile.avatarUrl = r.avatar_url;
  if(S.overview) S.overview.avatar_url = r.avatar_url;
  render(); toast("Looking sharp. Photo updated");
};
window.kycSubmit = async ()=>{
  const t = (document.getElementById("kyc_type")||{}).value || "BVN";
  const num = ((document.getElementById("kyc_num")||{}).value||"").trim();
  if(num.length < 10) return toast("Enter your full 11-digit number");
  const r = await rpc("kyc_submit", { p_id_type: t, p_last4: num.slice(-4) });
  if(r.error) return toast(r.error);
  S.profile.kycStatus = "pending";
  if(S.overview) S.overview.kyc_status = "pending";
  render();
  toast("Verification submitted. Status: pending review");
};
window.openUserDetail = async (username)=>{
  const r = await rpc("admin_user_detail", { p_username: username });
  if(r.error) return toast(r.error);
  S.admin.userDetail = r; render();
};
window.adminRole = async (username, makeAdmin)=>{
  if(!confirm((makeAdmin?"Make ":"Remove ")+username+(makeAdmin?" an admin?":" as admin?"))) return;
  const r = await rpc("admin_set_role", { p_username: username, p_is_admin: makeAdmin });
  if(r.error) return toast(r.error);
  await loadAdmin();
  const fresh = await rpc("admin_user_detail", { p_username: username });
  S.admin.userDetail = fresh && !fresh.error ? fresh : null;
  render(); toast((makeAdmin?"Granted admin. ":"Removed admin. ")+"Logged to the audit trail");
};
window.adminAdjust = async (username)=>{
  const raw = prompt("Balance adjustment for "+username+" in demo credits (use a negative number to deduct):");
  if(raw===null) return;
  const amt = parseInt(raw,10);
  if(!amt || isNaN(amt)) return toast("Enter a whole number, e.g. 5000 or -2000");
  const note = prompt("Reason for this adjustment (required, min 5 characters):");
  if(note===null) return;
  if(!note || note.trim().length<5) return toast("A clear reason is required");
  const r = await rpc("admin_wallet_adjust", { p_username: username, p_amount: amt, p_note: note });
  if(r.error) return toast(r.error);
  await loadAdmin();
  const fresh = await rpc("admin_user_detail", { p_username: username });
  S.admin.userDetail = fresh && !fresh.error ? fresh : null;
  render(); toast("Balance adjusted. Logged to the audit trail");
};
window.adminKyc = async (u, status)=>{
  const r = await rpc("admin_kyc_set", { p_username: u, p_status: status });
  if(r.error) return toast(r.error);
  await loadAdmin();
  if(S.admin.userDetail && S.admin.userDetail.username===u){
    const fresh = await rpc("admin_user_detail", { p_username: u });
    S.admin.userDetail = fresh && !fresh.error ? fresh : null;
  }
  render(); toast("KYC " + status + ". Logged to the audit trail");
};
window.copyMarketLink = ()=>{
  if(!S.detail) return;
  rpc("event_log", { p_event: "share_clicked", p_meta: { market_id: S.detail.id } });
  const s = slugify(S.detail.question);
  const link = "https://www.wanana.africa/market/" + S.detail.id + (s ? "-" + s : "");
  const done = ()=>toast("Market link copied. Send it to your people");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(done, ()=>prompt("Copy this market link:", link)); }
  else prompt("Copy this market link:", link);
};
window.copyRef = ()=>{
  rpc("event_log", { p_event: "share_clicked", p_meta: { kind: "referral" } });
  const link = "https://www.wanana.africa/?ref=" + (S.profile.referralCode||"");
  const done = ()=>toast("Invite link copied. Share it far");
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(done, ()=>prompt("Copy your invite link:", link)); }
  else prompt("Copy your invite link:", link);
};
window.topUp = async ()=>{
  const r = await rpc("wallet_top_up");
  if(r.error) return toast(r.error);
  S.profile.balance = r.balance; render(); toast("\u20A650,000 demo credits added. Make your call");
};

window.toggleReviewEngine = async ()=>{
  const cfg = S.admin.reviewCfg; if(!cfg) return;
  const next = !cfg.enabled;
  if(!confirm(next ? "Turn the auto review engine ON? Low-risk markets will go live without admin approval."
                   : "Turn the auto review engine OFF? Every new market will wait for admin review.")) return;
  const r = await rpc("admin_review_config_set", { p_enabled: next, p_low_max: null, p_medium_max: null });
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast(next ? "Auto review is ON. Logged to the audit trail" : "Auto review is OFF. Everything goes to admin review");
};
window.reviewOverride = async (id, approve)=>{
  const note = prompt("Reason for overriding the engine's decision (required, min 5 characters):");
  if(note===null) return;
  if(!note || note.trim().length<5) return toast("A clear reason is required");
  const r = await rpc("admin_review_override", { p_market_id: id, p_approve: approve, p_note: note });
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast("Override recorded. Logged to the audit trail");
};
window.adminAct = async (fn, id)=>{
  const args = fn==="admin_dispute_decide" ? { p_dispute_id: id } : { p_market_id: id };
  const r = await rpc(fn, args);
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast("Done. Logged to the audit trail");

window.adminOutcome = async (id, outcome)=>{
  const src = prompt("Public source that verifies this outcome (required):");
  if(src===null) return;
  if(!src || src.trim().length<3) return toast("A resolution source is required");
  const note = prompt("Resolution note (optional):") || null;
  const r = await rpc("admin_enter_outcome", { p_market_id:id, p_outcome:outcome, p_resolution_source:src, p_resolution_note:note });
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast("Outcome proposed. 48 hour dispute window is open");
};
window.adminCancel = async (id)=>{
  const reason = prompt("Reason for cancelling (refunds every stake):");
  if(reason===null) return;
  const r = await rpc("admin_cancel_market", { p_market_id:id, p_reason:reason||null });
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast("Market cancelled. All stakes refunded");
};
window.openDispute = (id, q)=>{ S.dispute = { id, q }; render(); };
window.sendDispute = async ()=>{
  const reason = (document.getElementById("dreason")||{}).value || "";
  const r = await rpc("dispute_open", { p_market_id:S.dispute.id, p_reason:reason });
  if(r.error) return toast(r.error);
  S.dispute = null; render();
  toast("Dispute opened. Our team will review it before settlement");
};

/* ---------------- Session lifecycle ---------------- */
const withTimeout = (p, ms)=> Promise.race([p, new Promise(res=>setTimeout(()=>res(null), ms))]);
sb.auth.onAuthStateChange((event, session)=>{
  S.session = session;
  if(event === "PASSWORD_RECOVERY"){ S.recovery = true; S.authMode = "newpass"; setMsg(null); render(); return; }
  /* IMPORTANT: never await supabase calls inside this callback - the client
     holds an internal lock while dispatching events and calling back into it
     can deadlock (sign-in succeeds server-side but the UI never advances).
     Defer all async work so the callback returns immediately. */
  setTimeout(async ()=>{
    try{
      if(event === "SIGNED_IN" || event === "INITIAL_SESSION" || event === "TOKEN_REFRESHED" || event === "USER_UPDATED"){
        if(session){ await withTimeout(Promise.all([loadProfile(), refreshCalls()]).catch(()=>null), 8000); checkWins();
          if(S.pendingRoute && S.profile){
            const pr = S.pendingRoute; S.pendingRoute = null;
            if(pr.marketId) await openDetail(pr.marketId, true);
            else { if(pr.cat) S.cat = pr.cat; if(pr.tab !== "home" || pr.cat) await go(pr.tab, true); }
          }
        }
      }
      if(event === "SIGNED_OUT"){ S.profile = null; S.myCalls = []; }
    }catch(e){}
    render();
  }, 0);
});

(async ()=>{
  try{
    const _rp = new URLSearchParams(location.search).get("ref");
    if(_rp) S.refPrefill = _rp.toUpperCase().slice(0,6);
  }catch(e){}
  /* Paint the interface immediately - never leave a blank screen while
     the session and data load in the background. */
  render();
  try{
    const sess = await withTimeout(sb.auth.getSession(), 6000);
    S.session = sess && sess.data ? sess.data.session : null;
    await withTimeout(loadMarkets(), 8000);
    render();
    if(S.session){ await withTimeout(Promise.all([loadProfile(), refreshCalls()]), 8000); checkWins(); }
  }catch(e){}
  /* Route from the URL: /market/42 opens that market, /arena/jollof-wars opens
     that arena, /calls opens Your calls, etc. If the visitor is signed out,
     remember where they wanted to go and take them there right after sign-in. */
  try{
    const r0 = routeFromPath();
    if(S.session && S.profile){
      if(r0.marketId) await openDetail(r0.marketId, true);
      else { if(r0.cat) S.cat = r0.cat; if(r0.tab !== "home" || r0.cat) await go(r0.tab, true); }
    } else if(r0.marketId || r0.tab !== "home" || r0.cat){
      S.pendingRoute = r0;
    }
  }catch(e){}
  render();
})();
};
