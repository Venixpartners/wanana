<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>wanana — Africa argues about everything. Wanana pays whoever is right.</title>
<meta name="description" content="Wanana is a peer prediction marketplace where the crowd sets the price, skill gets paid, and every result is verified. A game of skill. 18+ only." />
<meta name="theme-color" content="#0B0E31" />
<link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
<link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.json" />
<meta property="og:title" content="wanana — call it before it happens" />
<meta property="og:description" content="Africa argues about everything. Wanana pays whoever is right." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --indigo:#0B0E31;
  --card:#141A47;
  --line:#232B63;
  --orange:#FF7A1A;
  --glow:#FF9A4D;
  --teal:#2DD4BF;
  --coral:#FB7185;
  --text:#F4F6FF;
  --slate:#8E95BE;
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--indigo)}
body{width:100%;background:var(--indigo);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.3}
#app,.shell{width:100%;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:none}
button:disabled{opacity:.55;cursor:wait}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--orange);outline-offset:2px}
input,select,textarea{font-family:inherit;width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:14px}
::placeholder{color:var(--slate);opacity:.75}
img.logo{display:block;height:24px;width:auto}

/* ---------- App shell ---------- */
.shell{display:flex;flex-direction:column;padding-bottom:84px}
header.bar{position:sticky;top:0;z-index:30;background:rgba(11,14,49,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-in{width:100%;max-width:1200px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.topnav{display:none;gap:4px;flex:1;justify-content:center}
.topnav button{padding:9px 16px;border-radius:999px;font-weight:600;font-size:13.5px;color:var(--slate)}
.topnav button.on{color:var(--indigo);background:var(--orange)}
.balance{font-family:var(--disp);font-weight:600;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13.5px;white-space:nowrap}
.balance .naira{color:var(--glow)}
main{width:100%;max-width:1200px;margin:0 auto;padding-top:14px}
.narrow{width:100%;max-width:640px;margin:0 auto}

/* ---------- Feed ---------- */
.toolbar{padding:0 16px 12px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 16px 14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid var(--line);color:var(--slate)}
.chip.on{border-color:var(--orange);background:var(--orange);color:var(--indigo)}
.feed{display:flex;flex-wrap:wrap;gap:12px;padding:0 16px 24px}
.feed>.card{width:100%}
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:15px 16px;transition:transform .12s ease}
.card:active{transform:scale(.985)}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.cat{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.09em}
.live{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--teal);letter-spacing:.08em}
.live .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal)}
.q{font-family:var(--disp);font-weight:600;font-size:16.5px;line-height:1.32;margin-bottom:12px}
.bar{position:relative;display:flex;height:7px;border-radius:999px;margin-bottom:12px}
.bar .y{background:var(--teal);border-radius:999px 0 0 999px}
.bar .n{flex:1;background:var(--coral);border-radius:0 999px 999px 0}
.bar .spark{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:var(--orange);border:2.5px solid var(--indigo);box-shadow:0 0 10px rgba(255,122,26,.8)}
.row{display:flex;gap:10px;margin-bottom:11px}
.btn-yes,.btn-no{flex:1;padding:11px 0;border-radius:8px;font-family:var(--disp);font-weight:600;font-size:14px;text-align:center}
.btn-yes{background:rgba(45,212,191,.13);color:var(--teal)}
.btn-no{background:rgba(251,113,133,.13);color:var(--coral)}
.stats{display:flex;justify-content:space-between;font-size:12px;color:var(--slate)}
.stats b{color:var(--text);font-weight:600}
.coin{color:var(--glow)}
.empty{border:1px dashed var(--line);border-radius:8px;text-align:center;color:var(--slate);font-size:14px;padding:28px 16px;width:100%}

/* ---------- Section pages ---------- */
.tabtitle{font-family:var(--disp);font-weight:700;font-size:23px;margin:2px 0 5px}
.sub{color:var(--slate);font-size:13px;margin:0 0 16px;line-height:1.5}
.pad{padding:4px 16px 24px}
label{font-size:11.5px;font-weight:600;color:var(--slate);display:block;margin-bottom:6px;letter-spacing:.02em}
.field{margin-bottom:15px}
.cta{width:100%;padding:15px 0;border-radius:8px;background:var(--orange);color:var(--indigo);font-family:var(--disp);font-weight:700;font-size:15px;text-align:center}
.note{color:var(--slate);font-size:11.5px;margin-top:14px;line-height:1.65}
.statgrid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.stat{flex:1 1 calc(50% - 5px);min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:13px 14px}
.stat .l{font-size:10.5px;color:var(--slate);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.stat .v{font-family:var(--disp);font-weight:700;font-size:19px;margin-top:4px}
.aicard{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--orange);border-radius:8px;padding:15px 16px;margin-bottom:14px}
.aicard .t{font-family:var(--disp);font-weight:600;color:var(--glow);font-size:13px;margin-bottom:8px}
.aicard p{font-size:13.5px;line-height:1.65;color:var(--text)}
.comment{margin-bottom:11px;font-size:13.5px;line-height:1.5}
.comment b{color:var(--glow);font-weight:600}
.verified{display:inline-flex;align-items:center;gap:4px;color:var(--teal);font-weight:600}

/* ---------- Auth ---------- */
.authbox{background:rgba(20,26,71,.55);border:1px solid var(--line);border-radius:12px;padding:18px}
.authmsg{font-size:12.5px;line-height:1.6;color:var(--glow);margin:0 0 12px}
.authmsg.err{color:var(--coral)}
.alink{background:none;color:var(--slate);font-size:12.5px;font-weight:600;text-decoration:underline;text-underline-offset:3px;padding:0}
.alink:hover{color:var(--text)}
.alinks{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:14px}
.otp{letter-spacing:.35em;font-family:var(--disp);font-weight:700;font-size:20px;text-align:center}
.signout{font-size:12.5px;font-weight:600;color:var(--slate);border:1px solid var(--line);border-radius:999px;padding:7px 14px;white-space:nowrap}
.signout:hover{color:var(--coral);border-color:var(--coral)}

/* ---------- Bottom nav (mobile) ---------- */
nav.bottom{position:fixed;bottom:0;left:0;right:0;background:var(--indigo);border-top:1px solid var(--line);display:flex;z-index:40}
nav.bottom button{flex:1;padding:13px 0 calc(15px + env(safe-area-inset-bottom));color:var(--slate);font-weight:600;font-size:11.5px;position:relative}
nav.bottom button.on{color:var(--orange)}
nav.bottom button.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:3px;background:var(--orange);border-radius:0 0 4px 4px}

/* ---------- Sheets / modals ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(4,6,24,.72);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.sheet{width:100%;max-width:520px;max-height:88vh;overflow-y:auto;background:var(--indigo);border:1px solid var(--line);border-bottom:none;border-radius:14px 14px 0 0;padding:20px 18px calc(28px + env(safe-area-inset-bottom))}
.handle{width:40px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 16px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--orange);color:var(--indigo);font-weight:700;font-size:13px;padding:11px 18px;border-radius:999px;z-index:70;max-width:92vw;text-align:center}

/* ---------- Hero / splash ---------- */
.hero{width:100%;min-height:100vh;position:relative;overflow:hidden;display:flex;align-items:center}
.hero-in{position:relative;width:100%;max-width:1200px;margin:0 auto;padding:56px 26px;display:flex;gap:56px;align-items:center}
.hero-copy{width:100%;max-width:560px}
.skill-line{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--slate);margin-bottom:22px}
.hero-logo{width:min(72%,300px);height:auto;display:block}
.hero h1{font-family:var(--disp);font-weight:700;font-size:31px;line-height:1.18;margin:18px 0 12px}
.hero h1 .em{color:var(--orange)}
.hero p.lead{color:var(--slate);font-size:14.5px;line-height:1.65;margin:0 0 26px}
.hero-preview{display:none;flex:1;min-width:0;flex-direction:column;gap:14px}
.hero-preview .card{pointer-events:none}
.preview-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--slate)}
.net{position:absolute;inset:0;pointer-events:none;opacity:.5}

@media (prefers-reduced-motion:reduce){.card{transition:none}.spark{box-shadow:none !important}}

/* ===================== Tablet ≥ 768px ===================== */
@media (min-width:768px){
  .feed>.card{width:calc(50% - 6px)}
  .sheet-bg{align-items:center;padding:24px}
  .sheet{border-radius:14px;border-bottom:1px solid var(--line);padding-bottom:24px}
  .handle{display:none}
  .hero h1{font-size:40px}
  .hero-logo{width:300px}
  .tabtitle{font-size:27px}
  .stat{flex:1 1 calc(25% - 8px)}
}

/* ===================== Desktop ≥ 1024px ===================== */
@media (min-width:1024px){
  .shell{padding-bottom:32px}
  nav.bottom{display:none}
  .topnav{display:flex}
  main{padding-top:22px}
  .feed>.card{width:calc(33.333% - 8px)}
  .card{padding:17px 18px}
  .hero-in{padding:64px 40px}
  .hero-preview{display:flex}
  .hero h1{font-size:46px}
  .hero p.lead{font-size:16px}
  .toolbar{display:flex;gap:12px;align-items:center}
  .toolbar input{max-width:420px}
}
@media (min-width:1280px){
  .hero-in{gap:80px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* Public configuration. These are Supabase *publishable* values, safe to ship
   to browsers by design. Secret keys (service role, SMTP, payment keys) live
   only in server-side environment variables and never in this repo. */
const SB_URL = "https://ogplsilyrgvlyypxnhyp.supabase.co";
const SB_KEY = "sb_publishable_gH-vwvE5IVXkOpafeP5-OA_TzL5_krH";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

/* Legacy demo session cleanup */
localStorage.removeItem("wn_token"); localStorage.removeItem("wn_user");

const S = {
  session: null,          // Supabase auth session
  profile: null,          // { username, balance } once profile exists
  authMode: "signin",     // signin | signup | otp | otp_verify | reset | newpass
  authEmail: "",
  authMsg: null,          // { text, err }
  busy: false,
  markets: [], myCalls: [],
  tab: "home", cat: "All", query: "",
  detail: null, trade: null, comments: [],
  ledger: [], dispute: null,
  admin: { markets: [], disputes: [], ledger: [], users: [], comments: [], audit: [], panel: "markets" },
};
const CATS = ["All","Politics","Sports","Entertainment","Tech","Culture"];
const N = n => "\u20A6" + Number(n||0).toLocaleString("en-NG");
const esc = s => String(s).replace(/[&<>\"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const yesPct = m => { const t = m.yes_pool + m.no_pool; return t === 0 ? 50 : Math.round(m.yes_pool*100/t); };
const WORDMARK = `<img class="logo" src="/brand/wordmark.png" alt="wanana" />`;

async function rpc(fn, args){
  const { data, error } = await sb.rpc(fn, args || {});
  if(error) return { error: error.message || "Something went wrong. Try again." };
  return data;
}
async function loadMarkets(){
  const { data, error } = await sb.from("markets").select("*").eq("status","live").order("created_at",{ascending:false});
  if(!error && Array.isArray(data)) S.markets = data;
}
async function loadComments(id){
  const { data } = await sb.from("comments").select("*").eq("market_id", id).order("created_at",{ascending:true});
  S.comments = Array.isArray(data) ? data : [];
}
async function loadProfile(){
  if(!S.session){ S.profile = null; return; }
  const me = await rpc("me");
  S.profile = (me && me.username) ? { username: me.username, balance: me.balance, isAdmin: !!me.is_admin } : null;
}
async function loadLedger(){
  if(!S.session) return;
  const r = await rpc("ledger_recent");
  S.ledger = Array.isArray(r) ? r : [];
}
async function loadAdmin(){
  if(!S.profile || !S.profile.isAdmin) return;
  const [m, d, l, u, c, a] = await Promise.all([
    rpc("admin_markets"), rpc("admin_disputes"), rpc("admin_ledger_recent"),
    rpc("admin_users_recent"), rpc("admin_comments_recent"), rpc("admin_audit_recent")]);
  S.admin.markets  = Array.isArray(m) ? m : [];
  S.admin.disputes = Array.isArray(d) ? d : [];
  S.admin.ledger   = Array.isArray(l) ? l : [];
  S.admin.users    = Array.isArray(u) ? u : [];
  S.admin.comments = Array.isArray(c) ? c : [];
  S.admin.audit    = Array.isArray(a) ? a : [];
}
async function refreshCalls(){
  if(!S.session) return;
  const r = await rpc("my_calls");
  S.myCalls = Array.isArray(r) ? r : [];
}

let toastTimer;
function toast(msg){
  document.querySelectorAll(".toast").forEach(e=>e.remove());
  const d = document.createElement("div");
  d.className = "toast"; d.textContent = msg;
  document.body.appendChild(d);
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>d.remove(), 3400);
}
function setMsg(text, err){ S.authMsg = text ? { text, err: !!err } : null; }

function sparkNet(){
  return `<svg class="net" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g stroke="#232B63" stroke-width="1">
      <line x1="120" y1="140" x2="380" y2="80"/><line x1="380" y1="80" x2="640" y2="180"/>
      <line x1="640" y1="180" x2="820" y2="70"/><line x1="640" y1="180" x2="560" y2="360"/>
      <line x1="120" y1="140" x2="220" y2="330"/><line x1="220" y1="330" x2="560" y2="360"/>
      <line x1="160" y1="740" x2="420" y2="820"/><line x1="420" y1="820" x2="760" y2="760"/>
      <line x1="760" y1="760" x2="800" y2="580"/><line x1="1080" y1="120" x2="1300" y2="220"/>
      <line x1="1300" y1="220" x2="1240" y2="440"/><line x1="1240" y1="440" x2="1380" y2="620"/>
      <line x1="1080" y1="120" x2="960" y2="300"/><line x1="960" y1="300" x2="1240" y2="440"/>
    </g>
    <g fill="#232B63">
      <circle cx="120" cy="140" r="4"/><circle cx="380" cy="80" r="4"/><circle cx="820" cy="70" r="4"/>
      <circle cx="220" cy="330" r="4"/><circle cx="560" cy="360" r="4"/>
      <circle cx="160" cy="740" r="4"/><circle cx="420" cy="820" r="4"/><circle cx="760" cy="760" r="4"/><circle cx="800" cy="580" r="4"/>
      <circle cx="1080" cy="120" r="4"/><circle cx="1300" cy="220" r="4"/><circle cx="1240" cy="440" r="4"/><circle cx="1380" cy="620" r="4"/><circle cx="960" cy="300" r="4"/>
    </g>
    <circle cx="640" cy="180" r="6" fill="#FF7A1A"/>
    <circle cx="640" cy="180" r="12" fill="none" stroke="#FF7A1A" stroke-opacity=".35" stroke-width="2"/>
  </svg>`;
}

function marketCard(m, interactive=true){
  const y = yesPct(m);
  return `<div class="card" ${interactive?`onclick="openDetail(${m.id})" role="button" tabindex="0"`:""}>
    <div class="meta"><span class="cat">${m.category}</span><span class="live"><span class="dot"></span>LIVE</span></div>
    <div class="q">${esc(m.question)}</div>
    <div class="bar"><div class="y" style="width:${y}%"></div><div class="n"></div><div class="spark" style="left:${y}%"></div></div>
    ${interactive?`<div class="row">
      <button class="btn-yes" onclick="event.stopPropagation();openTrade(${m.id},'YES')">YES ${y}%</button>
      <button class="btn-no" onclick="event.stopPropagation();openTrade(${m.id},'NO')">NO ${100-y}%</button>
    </div>`:`<div class="row">
      <span class="btn-yes">YES ${y}%</span><span class="btn-no">NO ${100-y}%</span>
    </div>`}
    <div class="stats"><span><span class="coin">\u20A6</span> <b>${Number(m.yes_pool+m.no_pool).toLocaleString("en-NG")}</b> in the pool</span><span>ends ${esc(m.ends_on)}</span></div>
  </div>`;
}

const NAV_ITEMS = [["home","Markets"],["insights","Insights"],["create","Create"],["calls","Your calls"],["wallet","Wallet"]];
function navItems(){
  return S.profile && S.profile.isAdmin ? NAV_ITEMS.concat([["admin","Admin"]]) : NAV_ITEMS;
}
function navButtons(){
  return navItems().map(([k,l])=>`<button class="${S.tab===k?"on":""}" onclick="go('${k}')">${l}</button>`).join("");
}

function render(){
  const app = document.getElementById("app");
  if(!S.session){ app.innerHTML = heroView(); return; }
  if(!S.profile){ app.innerHTML = profileSetupView(); return; }
  app.innerHTML = `
  <div class="shell">
    <header class="bar"><div class="bar-in">
      <span style="display:flex;align-items:center">${WORDMARK}</span>
      <div class="topnav" role="navigation" aria-label="Main">${navButtons()}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="balance"><span class="naira">\u20A6</span>${Number(S.profile.balance).toLocaleString("en-NG")}</div>
      </div>
    </div></header>
    <main id="main">${views[S.tab]()}</main>
    ${S.detail ? detailSheet() : ""}
    ${S.trade ? tradeSheet() : ""}
    ${S.dispute ? disputeSheet() : ""}
    <nav class="bottom" aria-label="Main">${navButtons()}</nav>
  </div>`;
}

/* ---------------- Auth views ---------------- */
function authMsgHtml(){
  return S.authMsg ? `<p class="authmsg ${S.authMsg.err?"err":""}">${esc(S.authMsg.text)}</p>` : "";
}
function authBox(){
  const busy = S.busy ? "disabled" : "";
  const email = esc(S.authEmail);
  if(S.authMode === "signup") return `
    <div class="authbox">
      ${authMsgHtml()}
      <div class="field"><label>Email</label><input id="a_email" type="email" autocomplete="email" value="${email}" placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input id="a_pass" type="password" autocomplete="new-password" placeholder="At least 8 characters" /></div>
      <button class="cta" ${busy} onclick="doSignUp()">Create your Wanana account</button>
      <div class="alinks">
        <button class="alink" onclick="authGo('signin')">Already on Wanana? Sign in</button>
        <button class="alink" onclick="authGo('otp')">Use a one-time code</button>
      </div>
    </div>`;
  if(S.authMode === "otp") return `
    <div class="authbox">
      ${authMsgHtml()}
      <div class="field"><label>Email</label><input id="a_email" type="email" autocomplete="email" value="${email}" placeholder="you@example.com" /></div>
      <button class="cta" ${busy} onclick="doSendOtp()">Email me a one-time code</button>
      <div class="alinks">
        <button class="alink" onclick="authGo('signin')">Sign in with password</button>
        <button class="alink" onclick="authGo('signup')">New here? Create your account</button>
      </div>
    </div>`;
  if(S.authMode === "otp_verify") return `
    <div class="authbox">
      <p class="authmsg">Your Wanana code is ready. We sent it to ${email}. This code expires soon. Do not share this code with anyone.</p>
      ${S.authMsg && S.authMsg.err ? authMsgHtml() : ""}
      <div class="field"><label>Enter your 6-digit code</label>
        <input id="a_code" class="otp" inputmode="numeric" maxlength="6" placeholder="000000" /></div>
      <button class="cta" ${busy} onclick="doVerifyOtp()">Verify your Wanana account</button>
      <div class="alinks">
        <button class="alink" onclick="doSendOtp(true)">Send a new code</button>
        <button class="alink" onclick="authGo('signin')">Back to sign in</button>
      </div>
    </div>`;
  if(S.authMode === "reset") return `
    <div class="authbox">
      ${authMsgHtml()}
      <div class="field"><label>Email</label><input id="a_email" type="email" autocomplete="email" value="${email}" placeholder="you@example.com" /></div>
      <button class="cta" ${busy} onclick="doSendReset()">Send password reset link</button>
      <div class="alinks"><button class="alink" onclick="authGo('signin')">Back to sign in</button></div>

/* ---------------- Auth actions ---------------- */
function grabEmail(){
  const el = document.getElementById("a_email");
  if(el) S.authEmail = el.value.trim();
  return S.authEmail;
}
window.authGo = (mode)=>{ grabEmail(); S.authMode = mode; setMsg(null); render(); };

window.doSignUp = async ()=>{
  const email = grabEmail();
  const pass = (document.getElementById("a_pass")||{}).value || "";
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  if(pass.length < 8) { setMsg("Password needs at least 8 characters", true); return render(); }
  S.busy = true; render();
  const { data, error } = await sb.auth.signUp({ email, password: pass,
    options: { emailRedirectTo: location.origin } });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  if(data.session){ return; } /* auto-confirmed: onAuthStateChange takes over */
  S.authMode = "signin";
  setMsg("Verify your Wanana account. We sent a confirmation link to " + email + ". Open it, then sign in here.");
  render();
};
window.doSignIn = async ()=>{
  const email = grabEmail();
  const pass = (document.getElementById("a_pass")||{}).value || "";
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  S.busy = false;
  if(error){
    const m = /confirm/i.test(error.message)
      ? "Verify your Wanana account first. Check your inbox for the confirmation link."
      : error.message;
    setMsg(m, true); return render();
  }
  setMsg(null); /* onAuthStateChange renders the app */
};
window.doSendOtp = async (resend)=>{
  const email = resend ? S.authEmail : grabEmail();
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.signInWithOtp({ email, options: { shouldCreateUser: true } });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  S.authMode = "otp_verify"; setMsg(null); render();
  if(resend) toast("A new code is on its way");
};
window.doVerifyOtp = async ()=>{
  const code = ((document.getElementById("a_code")||{}).value || "").trim();
  if(code.length !== 6){ setMsg("Enter the 6-digit code from your email", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.verifyOtp({ email: S.authEmail, token: code, type: "email" });
  S.busy = false;
  if(error){ setMsg("That code did not work. It may have expired. Send a new one.", true); return render(); }
  setMsg(null); /* onAuthStateChange renders the app */
};
window.doSendReset = async ()=>{
  const email = grabEmail();
  if(!email.includes("@")) { setMsg("Enter a valid email address", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  S.authMode = "signin";
  setMsg("Check your inbox. Open the reset link and you can set a new password here.");
  render();
};
window.doSetNewPassword = async ()=>{
  const pass = (document.getElementById("a_pass")||{}).value || "";
  if(pass.length < 8){ setMsg("Password needs at least 8 characters", true); return render(); }
  S.busy = true; render();
  const { error } = await sb.auth.updateUser({ password: pass });
  S.busy = false;
  if(error){ setMsg(error.message, true); return render(); }
  S.authMode = "signin"; setMsg(null);
  await loadProfile(); render();
  toast("New password saved");
};
window.doProfileSetup = async ()=>{
  const u = ((document.getElementById("p_username")||{}).value || "").trim();
  if(u.length < 3){ setMsg("Username needs at least 3 characters", true); return render(); }
  S.busy = true; render();
  const r = await rpc("profile_setup", { p_username: u });
  S.busy = false;
  if(r.error){ setMsg(r.error, true); return render(); }
  S.profile = { username: r.username, balance: r.balance };
  setMsg(null); await loadMarkets(); render();
  toast(`Welcome ${r.username}. You have ${N(r.balance)} starter credits`);
};
window.doSignOut = async ()=>{
  await sb.auth.signOut();
  S.profile = null; S.myCalls = []; S.tab = "home"; S.authMode = "signin"; setMsg(null);
  toast("Signed out. Come back soon");
};

/* ---------------- App actions ---------------- */
window.go = async (t)=>{ S.tab=t; S.detail=null; S.trade=null;
  if(t==="home") await loadMarkets();
  if(t==="calls"||t==="insights") await refreshCalls();
  if(t==="wallet"){ await loadProfile(); await loadLedger(); }
  if(t==="admin") await loadAdmin();
  render(); };
window.renderMain = ()=>{ document.getElementById("main").innerHTML = views[S.tab]();
  const q=document.querySelector('#main .toolbar input'); if(q&&S.tab==="home"&&S.query){q.focus();q.setSelectionRange(q.value.length,q.value.length);} };
window.openDetail = async (id)=>{ S.detail = S.markets.find(m=>m.id===id); await loadComments(id); render(); };
window.openTrade = (id, side)=>{ S.trade = { m:S.markets.find(x=>x.id===id)||S.detail, side }; render(); };
window.updatePayout = (price)=>{ const v=parseInt(document.getElementById("stake").value,10);
  document.getElementById("payout").innerHTML = v>=500 ? `If your read lands you collect <b style="color:var(--glow)">${N(Math.round(v*100/Math.max(price,1)))}</b>` : ""; };
window.confirmStake = async ()=>{
  const v = parseInt(document.getElementById("stake").value,10);
  if(!v||v<500) return toast("Minimum stake is \u20A6500");
  const r = await rpc("call_place", { p_market_id:S.trade.m.id, p_side:S.trade.side, p_amount:v });
  if(r.error) return toast(r.error);
  S.profile.balance = r.balance; const side=S.trade.side; S.trade=null; S.detail=null;
  await loadMarkets(); render();
  toast(`Your ${side} call is in for ${N(v)}`);
};
window.submitMarket = async ()=>{
  const q=document.getElementById("cq").value, c=document.getElementById("cc").value,
        e=document.getElementById("ce").value, s=document.getElementById("cs").value;
  if(q.trim().length<15) return toast("Write a clear yes or no question first");
  if(!e.trim()) return toast("Set a resolution date");
  if(!s.trim()) return toast("Name a public source that settles it");
  const r = await rpc("market_create", { p_question:q, p_category:c, p_ends_on:e, p_source:s });
  if(r.error) return toast(r.error);
  await loadMarkets(); S.tab="home"; render();
  toast("Submitted. Your market goes live once our team approves it");
};
window.postComment = async ()=>{
  const b = document.getElementById("cbody").value;
  if(!b.trim()) return;
  const r = await rpc("comment_add", { p_market_id:S.detail.id, p_body:b });
  if(r.error) return toast(r.error);
  await loadComments(S.detail.id); render();
};
window.topUp = async ()=>{
  const r = await rpc("wallet_top_up");
  if(r.error) return toast(r.error);
  S.profile.balance = r.balance; render(); toast("\u20A650,000 free credits added");
};

window.adminAct = async (fn, id)=>{
  const args = fn==="admin_dispute_decide" ? { p_dispute_id: id } : { p_market_id: id };
  const r = await rpc(fn, args);
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast("Done. Logged to the audit trail");
};
window.adminOutcome = async (id, outcome)=>{
  const src = prompt("Public source that verifies this outcome (required):");
  if(src===null) return;
  if(!src || src.trim().length<3) return toast("A resolution source is required");
  const note = prompt("Resolution note (optional):") || null;
  const r = await rpc("admin_enter_outcome", { p_market_id:id, p_outcome:outcome, p_resolution_source:src, p_resolution_note:note });
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast("Outcome proposed. 48 hour dispute window is open");
};
window.adminCancel = async (id)=>{
  const reason = prompt("Reason for cancelling (refunds every stake):");
  if(reason===null) return;
  const r = await rpc("admin_cancel_market", { p_market_id:id, p_reason:reason||null });
  if(r.error) return toast(r.error);
  await loadAdmin(); renderMain();
  toast("Market cancelled. All stakes refunded");
};
window.openDispute = (id, q)=>{ S.dispute = { id, q }; render(); };
window.sendDispute = async ()=>{
  const reason = (document.getElementById("dreason")||{}).value || "";
  const r = await rpc("dispute_open", { p_market_id:S.dispute.id, p_reason:reason });
  if(r.error) return toast(r.error);
  S.dispute = null; render();
  toast("Dispute opened. Our team will review it before settlement");
};

/* ---------------- Session lifecycle ---------------- */
sb.auth.onAuthStateChange(async (event, session)=>{
  S.session = session;
  if(event === "PASSWORD_RECOVERY"){ S.authMode = "newpass"; setMsg(null); render(); return; }
  if(event === "SIGNED_IN" || event === "INITIAL_SESSION" || event === "TOKEN_REFRESHED" || event === "USER_UPDATED"){
    if(session){ await loadProfile(); await refreshCalls(); }
    render(); return;
  }
  if(event === "SIGNED_OUT"){ S.profile = null; S.myCalls = []; render(); }
});

(async ()=>{
  try{
    const { data } = await sb.auth.getSession();
    S.session = data ? data.session : null;
    await loadMarkets();
    if(S.session){ await loadProfile(); await refreshCalls(); }
  }catch(e){}
  render();
})();
</script>
</body>
</html>
